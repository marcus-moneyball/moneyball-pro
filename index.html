<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneyball Pro | Inteligência Quantitativa Esportiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        base: { bg: '#05070d', panel: '#0d1220', card: '#111827', border: '#1f2937' },
                        accent: { DEFAULT: '#8b5cf6', dim: '#6d28d9' },
                        conf: { alta: '#10b981', media: '#f59e0b', baixa: '#ef4444' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base-bg text-slate-200 font-sans min-h-screen" style="background-image: radial-gradient(circle at 50% 0%, rgba(139,92,246,0.08), transparent 60%);">
    <div class="max-w-2xl mx-auto p-4 md:p-8 space-y-6">

        <!-- HEADER -->
        <div class="text-center space-y-2 pt-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-accent/10 border border-accent/20 text-[10px] font-bold text-accent tracking-widest uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span> Engine v14.0
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">🚀 Moneyball Pro</h1>
            <p class="text-xs text-slate-500">Inteligência quantitativa aplicada ao esporte.</p>
        </div>

        <!-- SELETOR DE ESPORTE -->
        <div id="sport-tabs" class="grid grid-cols-3 gap-2"></div>

        <!-- CONFIG DA API -->
        <details class="bg-base-panel border border-base-border rounded-2xl p-4" open>
            <summary class="cursor-pointer text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fa-solid fa-key text-accent"></i> Configuração da API Groq
            </summary>
            <div class="mt-4 space-y-2">
                <label class="text-[10px] text-slate-500 font-bold tracking-widest">GROQ API KEY (Salva no navegador)</label>
                <input type="password" id="groq-key" placeholder="gsk_..." class="w-full bg-base-bg p-2.5 rounded-lg border border-base-border text-white text-sm font-mono">
                <p class="text-[11px] text-slate-600">A chave é salva de forma privada no armazenamento local do seu navegador (localStorage).</p>
            </div>
        </details>

        <!-- ETAPA 1: COLAR JSON DE ODDS -->
        <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-3">
            <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">1</span>
                <label class="text-sm font-semibold text-slate-300">Cole o JSON do Nexus v1.0</label>
            </div>
            <textarea id="json-input" class="w-full h-40 bg-base-bg p-3 rounded-lg border border-base-border font-mono text-xs text-emerald-400" placeholder='Cole o MDM JSON aqui...'></textarea>
            <button onclick="analisarComGroq()" id="analisar-btn" class="w-full py-3.5 bg-accent hover:bg-accent-dim font-bold rounded-xl text-white shadow-lg shadow-accent/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> Analisar com Groq
            </button>
        </div>

        <!-- ETAPA 2: BILHETE -->
        <div id="display-area"></div>
    </div>

<script>
        // ============================================================
        // 1. CONFIG — MÓDULOS DE ESPORTE E ABAS
        // ============================================================
        const MODULES = {
            beisebol: { label: "Beisebol", icon: "fa-baseball" },
            futebol: { label: "Futebol", icon: "fa-futbol" },
            basquete: { label: "Basquete", icon: "fa-basketball" }
        };

        let sportAtivo = "beisebol";

        function buildSportTabs() {
            const container = document.getElementById("sport-tabs");
            container.innerHTML = Object.entries(MODULES).map(([key, mod]) => `
                <button onclick="selecionarSport('${key}')" id="tab-${key}" class="py-3 px-4 rounded-xl border text-xs font-bold flex items-center justify-center gap-2 transition-all ${key === sportAtivo ? 'bg-accent/15 border-accent text-accent shadow-lg shadow-accent/10' : 'bg-base-panel border-base-border text-slate-400 hover:border-slate-700'}">
                    <i class="fa-solid ${mod.icon}"></i> ${mod.label}
                </button>
            `).join("");
        }

        function selecionarSport(key) {
            sportAtivo = key;
            buildSportTabs();
        }

        // ============================================================
        // DETECTOR INTELIGENTE DE ESPORTE
        // ============================================================
        function validarDadosMinimos(dadosOdds, moduloAtivoKey) {
            const str = JSON.stringify(dadosOdds).toLowerCase();
            
            const termosEsportes = {
                futebol: ["xg", "xga", "escanteios", "cartoes", "1x2", "half time", "gols", "futebol", "corners"],
                beisebol: ["pitcher", "era", "whip", "innings", "runs", "strikeouts", "mlb", "home runs", "beisebol"],
                basquete: ["rebotes", "assistencias", "pontos", "nba", "quarto", "triplos", "basquete", "handicap"]
            };

            let esporteDetectado = null;
            let maxHits = 0;

            for (const [esporte, termos] of Object.entries(termosEsportes)) {
                const hits = termos.filter(t => str.includes(t)).length;
                if (hits > maxHits && hits >= 2) {
                    maxHits = hits;
                    esporteDetectado = esporte;
                }
            }

            if (esporteDetectado && esporteDetectado !== moduloAtivoKey) {
                const nomeDetectado = MODULES[esporteDetectado]?.label || esporteDetectado;
                const nomeAtivo = MODULES[moduloAtivoKey]?.label || moduloAtivoKey;
                return {
                    ok: false,
                    erro: `Você colou um JSON de **${nomeDetectado}**, mas a aba selecionada é **${nomeAtivo}**. Alterne a aba acima para continuar.`
                };
            }

            return { ok: true };
        }

        // ============================================================
        // 2 PROMPT — ENGINE DE CÁLCULO QUANTITATIVO MONEYBALL V14
        // ============================================================
        function montarSystemPrompt(esporte) {
            return `Você é o Moneyball Bet Builder Engine v13.2.

Sua única função é transformar o JSON MDM recebido em um ranking quantitativo de oportunidades.

Você NÃO extrai dados.
Você NÃO pesquisa informações.
Você NÃO cria métricas inexistentes.
Você utiliza exclusivamente os dados presentes no MDM.

Sua saída deve ser exclusivamente JSON válido.

------------------------------------------------

MISSÃO

O objetivo NÃO é prever quem vencerá a partida.

O objetivo é identificar qual mercado apresenta a melhor relação entre:

• vantagem estatística
• robustez dos dados
• representatividade da vantagem
• preço oferecido pelas odds

O Moneyball Score mede exclusivamente essa qualidade.

------------------------------------------------

FLUXO OBRIGATÓRIO

1. Ler todo o MDM.
2. Construir o prognóstico da partida.
3. Avaliar TODOS os mercados.
4. Calcular o Moneyball Score.
5. Ordenar do maior para o menor.
6. Aplicar o Filtro Anti-Fragilidade.
7. Gerar top_bilhetes.
8. Calcular score_bilhete.

------------------------------------------------

PROGNÓSTICO

Antes de analisar mercados, identifique:
• quem possui vantagem técnica;
• onde essa vantagem acontece;
• como ela tende a influenciar a partida.

O prognóstico explica a partida. O Moneyball Score mede qual mercado representa melhor este prognóstico.

------------------------------------------------

MONEYBALL SCORE

O Score representa qualidade, não probabilidade de vitória.

Escala:
90–100: Oportunidade excepcional (extremamente rara).
80–89: Excelente oportunidade.
75–79: Muito forte.
60–74: Boa oportunidade.
45–59: Baixa confiança.
0–44: Sem valor.

Distribuição esperada: A maior parte dos mercados deve ficar abaixo de 75. Se existir dúvida entre duas notas, utilize sempre a menor. Nunca atribua Score acima de 90 sem convergência praticamente total.

------------------------------------------------

COMPOSIÇÃO

• IP Ajustado: 40%
• Robustez Estatística: 20%
• Fricção: 20%
• Eficiência de Mercado: 20%

------------------------------------------------

IP AJUSTADO
Mede a força técnica do confronto. Considere: projeções, atos, matchup, edge. Maior vantagem = maior nota.

ROBUSTEZ
Considere: tamanho da amostra, estabilidade, convergência, consistência. Quanto maior a incerteza, menor o Score.

FRICÇÃO
Considere: desfalques, calendário, viagens, clima, fadiga, volatilidade. Quanto maior a fricção, menor a nota.

EFICIÊNCIA DE MERCADO
Mercados eficientes (Moneyline) exigem vantagem claramente superior para receber notas altas. Favoritismo, odds baixas ou maior probabilidade nunca aumentam o Score por si sós.

REPRESENTATIVIDADE
O melhor mercado é aquele que isola diretamente a vantagem encontrada. Quanto maior a representatividade, maior a nota.

------------------------------------------------

FILTRO ANTI-FRAGILIDADE

Após calcular todos os Scores:
• ordene todos os mercados;
• elimine redundâncias;
• mantenha apenas os mercados de menor variância;
• nunca aprove dois mercados dependentes do mesmo roteiro quando existir alternativa superior.

------------------------------------------------

SELEÇÃO FINAL E EXPLICAÇÃO

Ordene todos os mercados. Selecione até 6. Caso nenhum mercado apresente qualidade suficiente, retorne apenas o melhor mercado disponível. Nunca deixe top_bilhetes vazio.

REGRAS RÍGIDAS PARA O CAMPO "w":
O campo "w" NUNCA pode ter apenas uma palavra. Ele OBRIGATORIAMENTE deve conter um parágrafo analítico completo de 2 a 3 frases (mínimo de 25 palavras), detalhando o cruzamento estatístico, o comportamento dos Atos e o porquê técnico do edge.

------------------------------------------------

SCHEMA JSON OBRIGATÓRIO (SAÍDA)

{
  "prognostico": "Texto descritivo do prognóstico tático...",
  "resumo": "Resumo executivo do bilhete...",
  "score_bilhete": 84.5,
  "top_bilhetes": [
    {
      "m": "Nome Exato do Mercado",
      "s": "Seleção / Nome do Time",
      "odds": 1.85,
      "sc": 86,
      "ip": 78,
      "ev": "+4.2%",
      "w": "Exemplo obrigatório do tamanho esperado: A projeção aponta forte assimetria nos Atos de criação pelo flanco esquerdo, sustentada por uma amostra robusta. Como a linha defensiva adversária sofre alta fricção sob pressão, este mercado isola perfeitamente o edge quantitativo com excelente valor esperado."
    }
  ],
  "analise": [
    {
      "m": "Nome do Mercado",
      "s": "Seleção",
      "sc": 70,
      "filtro": "aprovado",
      "motivo": "Razão analítica..."
    }
  ]
}

Responda exclusivamente em JSON válido, sem blocos de markdown adicionais ou textos externos.

        // ============================================================
        // 3. CHAMADA AO GROQ
        // ============================================================
        async function analisarComGroq() {
            const apiKey = document.getElementById("groq-key").value.trim();
            const raw = document.getElementById("json-input").value.trim();
            const btn = document.getElementById("analisar-btn");
            const display = document.getElementById("display-area");

            if (!apiKey) {
                display.innerHTML = alertaErro("Cole sua Groq API Key na seção de configuração acima primeiro.");
                return;
            }
            if (!raw) {
                display.innerHTML = alertaErro("Cole o JSON de odds antes de analisar.");
                return;
            }

            // --- CHECAGEM DE ESPORTE CRUZADO ---
            try {
                const jsonParsed = JSON.parse(raw);
                const checagem = validarDadosMinimos(jsonParsed, sportAtivo);
                if (!checagem.ok) {
                    display.innerHTML = alertaErro(checagem.erro);
                    return;
                }
            } catch (e) {
                display.innerHTML = alertaErro("O texto colado não é um JSON válido. Verifique as chaves e colchetes.");
                return;
            }
            // ------------------------------------

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Processando Motor Quantitativo...`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: montarSystemPrompt(MODULES[sportAtivo].label) },
                            { role: "user", content: raw }
                        ],
                        temperature: 0.1,
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "Erro na comunicação com a API Groq.");
                }

                const data = await response.json();
                const content = data.choices[0].message.content;
                const parsedResult = JSON.parse(content);

                renderizarBilhete(parsedResult);

            } catch (error) {
                display.innerHTML = alertaErro(`Falha na execução: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Analisar com Groq`;
            }
        }

        function alertaErro(msg) {
            return `<div class="bg-red-950/40 border border-red-900 text-red-300 text-sm p-4 rounded-xl">⚠️ ${msg}</div>`;
        }

        // ============================================================
        // 4. CLASSIFICAÇÃO E RENDERIZAÇÃO ROBUSTA DOS SCORES
        // ============================================================
        function tierPorItem(item) {
            if (!item || typeof item !== 'object') return { tier: "indefinida", label: "SEM SCORE", score: null };
            
            const scoreVal = item.sc !== undefined ? item.sc : (item.score !== undefined ? item.score : item.moneyball_score);
            const score = Number(scoreVal);

            if (isNaN(score) || scoreVal === null || scoreVal === undefined) {
                return { tier: "indefinida", label: "SEM SCORE", score: null };
            }
            
            if (score >= 75) return { tier: "alta", label: "BANDA VERDE", score };
            if (score >= 60) return { tier: "media", label: "BANDA AMARELA", score };
            if (score >= 45) return { tier: "baixa", label: "BANDA VERMELHA", score };
            return { tier: "descartada", label: "DESCARTE", score };
        }

        const CONFIABILIDADE_STYLE = {
            alta: { bg: "bg-emerald-500/15", text: "text-emerald-400", border: "border-emerald-500/30" },
            media: { bg: "bg-amber-500/15", text: "text-amber-400", border: "border-amber-500/30" },
            baixa: { bg: "bg-orange-500/15", text: "text-orange-400", border: "border-orange-500/30" },
            descartada: { bg: "bg-red-500/15", text: "text-red-400", border: "border-red-500/30" },
            indefinida: { bg: "bg-slate-700/20", text: "text-slate-400", border: "border-slate-700/40" },
        };

        function cardMercado(item) {
            if (!item || typeof item !== 'object') return '';
            const tier = tierPorItem(item);
            const v = CONFIABILIDADE_STYLE[tier.tier];

            const selecaoTxt = item.s || item.selecao || item.l || "Seleção Principal";
            const mercadoTxt = item.m || "Mercado";
            const explicacao = item.w || item.motivo || "";
            const oddsVal = item.odds !== undefined ? ` · Odds: <span class="text-white font-mono">${item.odds}</span>` : "";
            
            const ev = item.ev;
            const ip = item.ip ?? item.ip_ajustado;
            const extras = [];
            if (ev !== undefined && ev !== null) {
                const evPositivo = Number(ev) >= 0;
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded ${evPositivo ? 'bg-emerald-500/15 text-emerald-400' : 'bg-red-500/15 text-red-400'}">EV ${evPositivo ? '+' : ''}${ev}</span>`);
            }
            if (ip !== undefined && ip !== null) {
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-700/40 text-slate-300">IP ${ip}</span>`);
            }
            const extrasHtml = extras.length ? `<div class="flex flex-wrap gap-1.5 mt-1.5">${extras.join("")}</div>` : "";

            return `
                <div class="p-4 bg-base-card rounded-xl border ${v.border} hover:border-accent/40 transition-colors space-y-2">
                    <div class="flex justify-between items-start gap-2">
                        <span class="font-bold text-white text-sm">${mercadoTxt}</span>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${v.bg} ${v.text} shrink-0">${tier.label} · ${tier.score !== null ? tier.score : "-"}</span>
                    </div>
                    <div class="text-accent font-black text-lg flex items-center justify-between">
                        <span>${selecaoTxt}</span>
                        <span class="text-xs font-normal text-slate-400">${oddsVal}</span>
                    </div>
                    ${extrasHtml}
                    ${explicacao ? `<div class="text-xs text-slate-300 leading-relaxed pt-1.5 border-t border-slate-800/60">${explicacao}</div>` : ""}
                </div>`;
        }

        function renderizarBilhete(data) {
            const display = document.getElementById("display-area");

            let rawAnalise = data.analise || data.a || [];
            if (!Array.isArray(rawAnalise)) rawAnalise = [rawAnalise];

            let rawTop = data.top_bilhetes || data.tb || [];
            if (!Array.isArray(rawTop)) rawTop = [rawTop];

            const scoreBilhete = data.score_bilhete ?? data.sb;
            const resumo = data.resumo || data.p || data.prognostico;

            const melhor = rawTop[0] || null;
            const melhorSelecaoTxt = melhor ? (melhor.s || melhor.selecao || "") : "";
            const melhorTier = melhor ? tierPorItem(melhor) : null;

            const destaqueHtml = melhor ? `
                <div class="p-4 bg-gradient-to-br from-accent/15 to-accent/5 border-2 border-accent rounded-xl space-y-1">
                    <div class="flex items-center gap-2 text-accent text-xs font-bold uppercase tracking-wider">
                        <i class="fa-solid fa-trophy"></i> MELHOR SUGESTÃO QUANTITATIVA
                    </div>
                    <div class="text-white font-black text-xl">${melhorSelecaoTxt}</div>
                    <div class="text-xs text-slate-400">${melhor.m || ""} · Moneyball Score: <span class="font-bold text-accent">${melhorTier?.score ?? "-"}</span></div>
                    <div class="text-xs text-slate-300 leading-relaxed pt-1.5">${melhor.w || melhor.motivo || ""}</div>
                </div>
            ` : "";

            display.innerHTML = `
                <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-4 animate-in fade-in duration-300">
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">2</span>
                        <h2 class="text-sm font-semibold text-slate-300">Bilhete Sugerido Moneyball</h2>
                        ${scoreBilhete !== undefined && scoreBilhete !== null ? `<span class="ml-auto text-[10px] font-bold px-2.5 py-1 rounded-lg bg-accent/15 text-accent border border-accent/30">Score do Bilhete: ${scoreBilhete}</span>` : ""}
                    </div>

                    ${resumo ? `<p class="text-sm text-slate-400 border-l-2 border-accent pl-3 leading-relaxed">${resumo}</p>` : ""}

                    ${destaqueHtml}

                    <div class="space-y-3">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Top Oportunidades</h3>
                        ${rawTop.length === 0
                            ? `<p class="text-sm text-slate-500 text-center py-4">Nenhum mercado aprovado na margem de segurança.</p>`
                            : rawTop.map(item => cardMercado(item)).join("")
                        }
                    </div>

                    ${rawAnalise.length > 0 ? `
                        <details class="pt-2 border-t border-base-border">
                            <summary class="cursor-pointer text-xs font-semibold text-slate-400">Ver análise quantitativa completa (${rawAnalise.length} mercados)</summary>
                            <div class="space-y-3 mt-3">
                                ${rawAnalise.map(item => cardMercado(item)).join("")}
                            </div>
                        </details>
                    ` : ""}

                    <p class="text-[10px] text-slate-600 pt-2 border-t border-base-border">Modelagem baseada em probabilidade estatística e análise quantitativa.</p>
                </div>
            `;
        }

        // INIT
        window.onload = () => {
            buildSportTabs();
            selecionarSport("beisebol");

            const groqInput = document.getElementById("groq-key");
            const savedKey = localStorage.getItem("moneyball_groq_key");
            if (savedKey) groqInput.value = savedKey;

            groqInput.addEventListener("input", (e) => {
                localStorage.setItem("moneyball_groq_key", e.target.value.trim());
            });
        };
    </script>
</body>
</html>
