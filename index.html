<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneyball Pro | Não prevê resultados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        base: { bg: '#05070d', panel: '#0d1220', card: '#111827', border: '#1f2937' },
                        accent: { DEFAULT: '#8b5cf6', dim: '#6d28d9' },
                        conf: { alta: '#10b981', media: '#f59e0b', baixa: '#f97316', descarte: '#ef4444' },
                    }
                }
            }
        }
    </script>
    <style>
        /* gauge circular de MBS via conic-gradient — sem lib externa */
        .mbs-gauge {
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            flex-shrink: 0;
        }
        .mbs-gauge-inner {
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            background: #111827;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    </style>
</head>
<body class="bg-base-bg text-slate-200 font-sans min-h-screen" style="background-image: radial-gradient(circle at 50% 0%, rgba(139,92,246,0.10), transparent 55%), radial-gradient(circle at 100% 100%, rgba(16,185,129,0.05), transparent 50%);">
    <div class="max-w-2xl mx-auto p-4 md:p-8 space-y-6">

        <!-- HEADER -->
        <div class="text-center space-y-2 pt-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-accent/10 border border-accent/20 text-[10px] font-bold text-accent tracking-widest uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span> Engine v12.0 · gpt-oss-120b
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">🚀 Moneyball Pro</h1>
            <p class="text-xs text-slate-500">Inteligência quantitativa aplicada ao esporte.</p>
        </div>

        <!-- SELETOR DE ESPORTE -->
        <div id="sport-tabs" class="grid grid-cols-3 gap-2"></div>

        <!-- CONFIG DA API -->
        <details class="bg-base-panel border border-base-border rounded-2xl p-4" open>
            <summary class="cursor-pointer text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fa-solid fa-key text-accent"></i> Configuração da API Groq
            </summary>
            <div class="mt-4 space-y-2">
                <label class="text-[10px] text-slate-500 font-bold tracking-widest">GROQ API KEY (salva no navegador)</label>
                <input type="password" id="groq-key" placeholder="gsk_..." class="w-full bg-base-bg p-2.5 rounded-lg border border-base-border text-white text-sm font-mono">
                <p class="text-[11px] text-slate-600">A chave fica salva de forma privada no armazenamento local do seu navegador (localStorage). Ela nunca fica salva no código-fonte do GitHub.</p>
            </div>
        </details>

        <!-- ETAPA 1: COLAR JSON DE ODDS -->
        <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-3">
            <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">1</span>
                <label class="text-sm font-semibold text-slate-300">Cole o JSON de odds (gerado no chat de visão)</label>
            </div>
            <textarea id="json-input" class="w-full h-40 bg-base-bg p-3 rounded-lg border border-base-border font-mono text-xs text-emerald-400" placeholder='{ "casa": "...", "visitante": "...", "odds": {...}, "resumo_casa": "o que a casa espera do jogo" }'></textarea>
            <button onclick="analisarComGroq()" id="analisar-btn" class="w-full py-3.5 bg-accent hover:bg-accent-dim font-bold rounded-xl text-white shadow-lg shadow-accent/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> Analisar com Groq
            </button>
        </div>

        <!-- ETAPA 2: BILHETE -->
        <div id="display-area"></div>
    </div>

<script>
        // ============================================================
        // 1. CONFIG — cada esporte define seus mercados de interesse.
        // ============================================================
        const MODULES = {
            beisebol: {
                label: "Beisebol",
                icon: "fa-baseball",
                mercados: ["Runs (Total)", "Moneyline", "Handicap (Run Line)", "Strikeouts", "Outs Registrados", "Hits"],
            },
            futebol: {
                label: "Futebol",
                icon: "fa-futbol",
                mercados: ["Gols (Over/Under)", "Moneyline (1X2)", "Handicap Asiático", "Half Time / Full Time", "Escanteios", "Chutes a Gol", "Cartões"],
            },
            basquete: {
                label: "Basquete",
                icon: "fa-basketball",
                mercados: ["Moneyline", "Handicap (Spread)", "Totais (Over/Under)", "Estatísticas Individuais", "Pontos", "Rebotes", "Assistências"],
            },
        };

        // ============================================================
        // PROTOCOLO DE VALIDAÇÃO DE DADOS (Liberado — confia no Nexus Core)
        // ============================================================
        function validarDadosMinimos(dadosOdds, modulo) {
            return { ok: true, faltando: [] };
        }

        let sportAtivo = "beisebol";

        function buildSportTabs() {
            const container = document.getElementById("sport-tabs");
            container.innerHTML = Object.entries(MODULES).map(([id, m]) => `
                <button onclick="selecionarSport('${id}')" id="sporttab-${id}"
                    class="sport-tab py-3 rounded-xl border text-sm font-semibold flex flex-col items-center gap-1 transition-all">
                    <i class="fa-solid ${m.icon}"></i>
                    <span>${m.label}</span>
                </button>
            `).join("");
        }

        function selecionarSport(id) {
            sportAtivo = id;
            document.querySelectorAll(".sport-tab").forEach(btn => {
                btn.classList.remove("bg-accent/15", "text-accent", "border-accent/40");
                btn.classList.add("bg-base-panel", "text-slate-400", "border-base-border");
            });
            const activeBtn = document.getElementById("sporttab-" + id);
            activeBtn.classList.remove("bg-base-panel", "text-slate-400", "border-base-border");
            activeBtn.classList.add("bg-accent/15", "text-accent", "border-accent/40");
        }

        // ============================================================
        // 2. PROMPT — v8.10.1: corrige o bug de "${esporte}" virar
        // "[object Object]" (a função recebia o módulo inteiro, não o
        // nome) e reintroduz limiares explícitos de banda + regra de
        // sempre entregar os 5 melhores em "tb".
        // ============================================================
        function montarSystemPrompt(modulo) {
            const esporte = modulo.label;
            return `
Você é o **Bet Builder Engine (v8.10)**, motor quantitativo do sistema Moneyball para **${esporte}**. Processe o MDM JSON recebido e emita direto o JSON final abaixo — sem narrar etapas, sem pensar em voz alta, sem texto fora do JSON.

MERCADOS POSSÍVEIS: ${modulo.mercados.join(", ")}

REGRAS DE CÁLCULO (score 0-100 por mercado):
- Pilares: Alinhamento de Atos/Força (IP Ajustado), Robustez da amostra (n), Edge (linha projetada vs linha da casa), Fricção/Contexto (desfalques, calendário), Eficiência/EV.
- Banda (\`b\`) pelo score: Verde ≥75 · Amarela 60-74 · Vermelha 45-59 · Descarte <45.

REGRAS DE SAÍDA:
- \`tb\`: SEMPRE os 5 mercados de maior score (nunca 1 só se houver 5+ analisados). Se menos de 5 baterem 45, complete com os próximos melhores como Descarte, avisando em \`r\`. Cada item tem nome da equipe/seleção e \`w\` objetivo (máx. 120 chars, sem repetir argumento entre itens).
- \`a\`: só os mercados que ficaram FORA de \`tb\` (nunca repita item do \`tb\`), com só \`e\`,\`m\`,\`s\`,\`sc\`,\`b\`. Vazio se nada sobrar.
- Resposta começa em \`{\` e termina em \`}\`. Sem markdown, sem saudação.

### SAÍDA (o array "tb" tem 5 itens; "a" só mercados fora de "tb"):
{
  "p": "Prognóstico em até 180 chars",
  "r": "Resumo executivo em até 100 chars",
  "sb": 0,
  "tb": [
    {
      "e": "Esporte",
      "m": "Mercado",
      "s": "Seleção + Linha Exata",
      "at": "A|B",
      "sc": 80,
      "ip": 7.5,
      "b": "Verde|Amarela|Vermelha",
      "st": 1.0,
      "ev": 0.0,
      "w": "Justificativa objetiva em até 120 chars",
      "f": ["fator_risco"]
    }
  ],
  "a": [
    { "e": "", "m": "", "s": "", "sc": 0, "b": "Descarte" }
  ]
}`;
        }

        // ============================================================
        // 3. CLASSIFICAÇÃO POR MONEYBALL SCORE — ÚNICA DEFINIÇÃO
        //    (a v8.10 colada tinha isso duplicado 2x como `const`, o
        //    que gera SyntaxError e quebra o script inteiro — script
        //    nem chegava a rodar. Consolidado aqui numa versão só,
        //    juntando o melhor das duas: blindagem contra item nulo +
        //    leitura de ip/stake/ativo/fatores de risco.)
        // ============================================================
        const BANDA_MAP = {
            "verde":    { tier: "alta",       label: "BANDA VERDE",    cor: "#10b981" },
            "amarela":  { tier: "media",      label: "BANDA AMARELA", cor: "#f59e0b" },
            "vermelha": { tier: "baixa",      label: "BANDA VERMELHA", cor: "#f97316" },
            "descarte": { tier: "descartada", label: "DESCARTE",       cor: "#ef4444" },
        };

        const CONFIABILIDADE_STYLE = {
            alta:       { bg: "bg-emerald-500/15", text: "text-emerald-400", border: "border-emerald-500/30", cor: "#10b981" },
            media:      { bg: "bg-amber-500/15",   text: "text-amber-400",   border: "border-amber-500/30",   cor: "#f59e0b" },
            baixa:      { bg: "bg-orange-500/15",  text: "text-orange-400",  border: "border-orange-500/30",  cor: "#f97316" },
            descartada: { bg: "bg-red-500/15",     text: "text-red-400",     border: "border-red-500/30",     cor: "#ef4444" },
            indefinida: { bg: "bg-slate-700/20",   text: "text-slate-400",   border: "border-slate-700/40",   cor: "#64748b" },
        };

        function tierPorItem(item) {
            if (!item || typeof item !== 'object') return { tier: "indefinida", label: "SEM SCORE", score: null };

            const scoreVal = item.sc ?? item.score ?? item.moneyball_score;
            const score = Number(scoreVal);
            const scoreFinal = isNaN(score) ? null : score;

            const banda = (item.b || "").toLowerCase();
            if (BANDA_MAP[banda]) return { ...BANDA_MAP[banda], score: scoreFinal };

            if (scoreFinal === null) return { tier: "indefinida", label: "SEM SCORE", score: null };
            if (scoreFinal >= 75) return { tier: "alta", label: "BANDA VERDE", score: scoreFinal };
            if (scoreFinal >= 60) return { tier: "media", label: "BANDA AMARELA", score: scoreFinal };
            if (scoreFinal >= 45) return { tier: "baixa", label: "BANDA VERMELHA", score: scoreFinal };
            return { tier: "descartada", label: "DESCARTE", score: scoreFinal };
        }

        function mbsGauge(score, tier, size = 56) {
            const v = CONFIABILIDADE_STYLE[tier] || CONFIABILIDADE_STYLE.indefinida;
            const s = score ?? 0;
            const pct = Math.max(2, Math.min(100, s));
            return `
                <div class="mbs-gauge" style="width:${size}px; height:${size}px; background: conic-gradient(${v.cor} ${pct}%, #1f2937 ${pct}%);">
                    <div class="mbs-gauge-inner">
                        <span class="font-black text-white" style="font-size:${size * 0.32}px;">${score ?? "-"}</span>
                        <span class="text-[7px] font-bold text-slate-500 tracking-widest">MBS</span>
                    </div>
                </div>`;
        }

        function cardMercado(item, destaque = false) {
            if (!item || typeof item !== 'object') return '';
            const tier = tierPorItem(item);
            const v = CONFIABILIDADE_STYLE[tier.tier];

            const selecaoTxt = item.s || item.selecao || (item.l ? `${item.selecao || ""} ${item.l}` : "Seleção Principal");
            const mercadoTxt = item.m || "Mercado";
            const explicacao = item.w || item.motivo || "";
            const ev = item.ev;
            const ip = item.ip ?? item.ip_ajustado;
            const stake = item.st ?? item.stake_sugerida;
            const odds = item.odds;
            const fatores = item.f || [];

            const extras = [];
            if (ev !== undefined && ev !== null) {
                const evPositivo = Number(ev) >= 0;
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded ${evPositivo ? 'bg-emerald-500/15 text-emerald-400' : 'bg-red-500/15 text-red-400'}">EV ${evPositivo ? '+' : ''}${ev}</span>`);
            }
            if (ip !== undefined && ip !== null) {
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-700/40 text-slate-300">IP ${ip}</span>`);
            }
            if (stake !== undefined && stake !== null) {
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-accent/15 text-accent">Stake ${stake}u</span>`);
            }
            if (odds !== undefined && odds !== null) {
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-700/40 text-slate-300 font-mono">Odds ${odds}</span>`);
            }
            const extrasHtml = extras.length ? `<div class="flex flex-wrap gap-1.5 mt-2">${extras.join("")}</div>` : "";
            const fatoresHtml = fatores.length ? `<div class="flex flex-wrap gap-1.5 mt-1.5">${fatores.map(fr => `<span class="text-[10px] font-medium px-2 py-0.5 rounded bg-red-500/10 text-red-400 border border-red-500/20">⚠ ${fr}</span>`).join("")}</div>` : "";

            const gaugeSize = destaque ? 64 : 52;

            return `
                <div class="p-4 rounded-xl border ${destaque ? 'bg-gradient-to-br from-accent/15 to-accent/5 border-2 border-accent' : `bg-base-card ${v.border}`} hover:border-accent/40 transition-colors">
                    ${destaque ? `<div class="flex items-center gap-2 text-accent text-[10px] font-bold mb-2 uppercase tracking-wider"><i class="fa-solid fa-trophy"></i> Melhor sugestão do jogo</div>` : ""}
                    <div class="flex items-start gap-3">
                        ${mbsGauge(tier.score, tier.tier, gaugeSize)}
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2">
                                <span class="font-bold text-white text-sm">${mercadoTxt}</span>
                                <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${v.bg} ${v.text} shrink-0 whitespace-nowrap">${tier.label}</span>
                            </div>
                            <div class="text-accent font-black ${destaque ? 'text-xl' : 'text-base'} mt-0.5 truncate">${selecaoTxt}</div>
                            ${extrasHtml}
                        </div>
                    </div>
                    ${fatoresHtml}
                    ${explicacao ? `<div class="text-xs text-slate-400 leading-relaxed mt-2 pt-2 border-t border-slate-800/60">${explicacao}</div>` : ""}
                </div>`;
        }

        // ============================================================
        // 4. CHAMADA AO GROQ
        // ============================================================
        async function analisarComGroq() {
            const apiKey = document.getElementById("groq-key").value.trim();
            const raw = document.getElementById("json-input").value.trim();
            const btn = document.getElementById("analisar-btn");
            const display = document.getElementById("display-area");

            if (!apiKey) {
                display.innerHTML = alertaErro("Cole sua Groq API Key na seção de configuração acima primeiro.");
                return;
            }
            if (!raw) {
                display.innerHTML = alertaErro("Cole o JSON de odds antes de analisar.");
                return;
            }

            let dadosOdds;
            try {
                dadosOdds = JSON.parse(raw);
            } catch (e) {
                display.innerHTML = alertaErro("O JSON colado está com formato inválido.");
                return;
            }

            const modulo = MODULES[sportAtivo];

            if (dadosOdds.esporte && dadosOdds.esporte.toLowerCase() !== sportAtivo.toLowerCase()) {
                display.innerHTML = alertaErro(`O JSON colado é de "${dadosOdds.esporte}", mas a aba selecionada é "${modulo.label}".`);
                return;
            }

            const validacaoDados = validarDadosMinimos(dadosOdds, modulo);
            if (!validacaoDados.ok) {
                display.innerHTML = `<div class="bg-amber-950/30 border border-amber-800/40 text-amber-300 text-sm p-4 rounded-xl space-y-2">
                                        <p class="font-bold">⚠️ DADOS INSUFICIENTES</p>
                                        <ul class="text-xs list-disc list-inside">${validacaoDados.faltando.map(f => `<li>${f}</li>`).join("")}</ul>
                                    </div>`;
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Analisando...`;
            display.innerHTML = `<p class="text-slate-500 text-sm text-center py-4">Processando...</p>`;

            try {
                const systemPrompt = montarSystemPrompt(modulo) + " Seja conciso nos textos, mas preencha todos os campos numéricos. Responda apenas com o JSON, sem textos adicionais.";
                const userInput = raw;

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-oss-120b",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userInput }
                        ],
                        temperature: 0.2,
                        max_completion_tokens: 10000,
                        reasoning_effort: "low",
                        include_reasoning: false,
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText.slice(0, 200)}`);
                }

                const data = await response.json();
                const conteudo = data.choices?.[0]?.message?.content;
                if (!conteudo) throw new Error("Resposta do Groq veio vazia.");

                const parsed = JSON.parse(conteudo.replace(/```json|```/g, "").trim());
                renderizarBilhete(parsed);
            } catch (err) {
                console.error("Erro na análise Groq:", err);
                display.innerHTML = alertaErro(`Não consegui completar a análise. ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Analisar com Groq`;
            }
        }

        function alertaErro(msg) {
            return `<div class="bg-red-950/40 border border-red-900 text-red-300 text-sm p-4 rounded-xl">⚠️ ${msg}</div>`;
        }

        // ============================================================
        // 5. RENDERIZAÇÃO DO BILHETE
        // ============================================================
        function legendaBandas() {
            const itens = [
                { cor: "#10b981", label: "Verde ≥75" },
                { cor: "#f59e0b", label: "Amarela 60–74" },
                { cor: "#f97316", label: "Vermelha 45–59" },
                { cor: "#ef4444", label: "Descarte <45" },
            ];
            return `<div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-[10px] text-slate-500 pb-1">
                ${itens.map(i => `<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:${i.cor}"></span>${i.label}</span>`).join("")}
            </div>`;
        }

        function renderizarBilhete(data) {
            const display = document.getElementById("display-area");

            let rawAnalise = data.a || data.analise || [];
            if (!Array.isArray(rawAnalise)) rawAnalise = (typeof rawAnalise === 'object' && rawAnalise !== null) ? [rawAnalise] : [];
            const analiseCompleta = rawAnalise;

            let rawTop = data.tb || data.top_bilhetes || [];
            if (!Array.isArray(rawTop)) rawTop = (typeof rawTop === 'object' && rawTop !== null) ? [rawTop] : [];
            const topBilhetes = [...rawTop].sort((a, b) => (Number(b.sc ?? b.moneyball_score) || 0) - (Number(a.sc ?? a.moneyball_score) || 0));

            const scoreBilhete = data.sb ?? data.score_bilhete;
            const prognostico = data.p || data.resumo;
            const resumoExecutivo = data.r;

            const melhor = topBilhetes[0] || null;
            const resto = topBilhetes.slice(1);

            display.innerHTML = `
                <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-4 animate-in fade-in duration-300">
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">2</span>
                        <h2 class="text-sm font-semibold text-slate-300">Bilhete Sugerido</h2>
                        ${scoreBilhete !== undefined && scoreBilhete !== null ? `<span class="ml-auto text-[10px] font-bold px-2 py-1 rounded-lg bg-accent/15 text-accent">Score do Bilhete: ${scoreBilhete}</span>` : ""}
                    </div>

                    ${prognostico ? `<p class="text-sm text-slate-400 border-l-2 border-accent pl-3 leading-relaxed">${prognostico}</p>` : ""}
                    ${resumoExecutivo ? `<p class="text-xs italic text-slate-500">${resumoExecutivo}</p>` : ""}

                    ${legendaBandas()}

                    <div class="space-y-3">
                        ${topBilhetes.length === 0
                            ? `<p class="text-sm text-slate-500 text-center py-4">Nenhum mercado atingiu a margem mínima de segurança.</p>`
                            : (melhor ? cardMercado(melhor, true) : "") + resto.map(item => cardMercado(item)).join("")
                        }
                    </div>

                    ${analiseCompleta.length > 0 ? `
                        <details class="pt-2 border-t border-base-border">
                            <summary class="cursor-pointer text-xs font-semibold text-slate-400">Ver análise completa (${analiseCompleta.length} mercado(s) avaliados)</summary>
                            <div class="space-y-3 mt-3">
                                ${analiseCompleta.map(item => cardMercado(item)).join("")}
                            </div>
                        </details>
                    ` : ""}

                    <p class="text-[10px] text-slate-600 pt-2 border-t border-base-border">Isso é apoio à análise baseado em dados, não garantia de resultado.</p>
                </div>
            `;
        }

        // ============================================================
        // INIT & PERSISTÊNCIA DA CHAVE
        // ============================================================
        window.onload = () => {
            buildSportTabs();
            selecionarSport("beisebol");

            const groqInput = document.getElementById("groq-key");
            const savedKey = localStorage.getItem("moneyball_groq_key");
            if (savedKey) groqInput.value = savedKey;

            groqInput.addEventListener("input", (e) => {
                localStorage.setItem("moneyball_groq_key", e.target.value.trim());
            });
        };
    </script>
</body>
</html>
