<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneyball Pro | Inteligência Quantitativa Esportiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        base: { bg: '#05070d', panel: '#0d1220', card: '#111827', border: '#1f2937' },
                        accent: { DEFAULT: '#8b5cf6', dim: '#6d28d9' },
                        conf: { alta: '#10b981', media: '#f59e0b', baixa: '#ef4444' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base-bg text-slate-200 font-sans min-h-screen" style="background-image: radial-gradient(circle at 50% 0%, rgba(139,92,246,0.08), transparent 60%);">
    <div class="max-w-2xl mx-auto p-4 md:p-8 space-y-6">

        <!-- HEADER -->
        <div class="text-center space-y-2 pt-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-accent/10 border border-accent/20 text-[10px] font-bold text-accent tracking-widest uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span> Engine v14.0 — Strict Mode
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">🚀 Moneyball Pro</h1>
            <p class="text-xs text-slate-500">Inteligência quantitativa aplicada ao esporte.</p>
        </div>

        <!-- SELETOR DE ESPORTE -->
        <div id="sport-tabs" class="grid grid-cols-3 gap-2"></div>

        <!-- CONFIG DA API -->
        <details class="bg-base-panel border border-base-border rounded-2xl p-4" open>
            <summary class="cursor-pointer text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fa-solid fa-key text-accent"></i> Configuração da API Groq
            </summary>
            <div class="mt-4 space-y-2">
                <label class="text-[10px] text-slate-500 font-bold tracking-widest">GROQ API KEY (Salva no navegador)</label>
                <input type="password" id="groq-key" placeholder="gsk_..." class="w-full bg-base-bg p-2.5 rounded-lg border border-base-border text-white text-sm font-mono">
                <p class="text-[11px] text-slate-600">A chave é salva de forma privada no armazenamento local do seu navegador (localStorage).</p>
            </div>
        </details>

        <!-- ETAPA 1: COLAR JSON DE ODDS -->
        <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-3">
            <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">1</span>
                <label class="text-sm font-semibold text-slate-300">Cole o JSON do Nexus v1.0</label>
            </div>
            <textarea id="json-input" class="w-full h-40 bg-base-bg p-3 rounded-lg border border-base-border font-mono text-xs text-emerald-400" placeholder='Cole o MDM JSON aqui...'></textarea>
            <button id="analisar-btn" class="w-full py-3.5 bg-accent hover:bg-accent-dim font-bold rounded-xl text-white shadow-lg shadow-accent/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> Analisar com Groq
            </button>
        </div>

        <!-- ETAPA 2: BILHETE -->
        <div id="display-area"></div>
    </div>

<script>
    // ============================================================
    // 1. CONFIG — MÓDULOS DE ESPORTE E ABAS
    // ============================================================
    const MODULES = {
        beisebol: { label: "Beisebol", icon: "fa-baseball" },
        futebol: { label: "Futebol", icon: "fa-futbol" },
        basquete: { label: "Basquete", icon: "fa-basketball" }
    };

    let sportAtivo = "beisebol";

    function buildSportTabs() {
        const container = document.getElementById("sport-tabs");
        container.innerHTML = Object.entries(MODULES).map(([key, mod]) => `
            <button onclick="selecionarSport('${key}')" id="tab-${key}" class="py-3 px-4 rounded-xl border text-xs font-bold flex items-center justify-center gap-2 transition-all ${key === sportAtivo ? 'bg-accent/15 border-accent text-accent shadow-lg shadow-accent/10' : 'bg-base-panel border-base-border text-slate-400 hover:border-slate-700'}">
                <i class="fa-solid ${mod.icon}"></i> ${mod.label}
            </button>
        `).join("");
    }

    function selecionarSport(key) {
        sportAtivo = key;
        buildSportTabs();
    }

    // ============================================================
    // DETECTOR INTELIGENTE DE ESPORTE
    // ============================================================
    function validarDadosMinimos(dadosOdds, moduloAtivoKey) {
        const str = JSON.stringify(dadosOdds).toLowerCase();
        
        const termosEsportes = {
            futebol: ["xg", "xga", "escanteios", "cartoes", "1x2", "half time", "gols", "futebol", "corners"],
            beisebol: ["pitcher", "era", "whip", "innings", "runs", "strikeouts", "mlb", "home runs", "beisebol"],
            basquete: ["rebotes", "assistencias", "pontos", "nba", "quarto", "triplos", "basquete", "handicap"]
        };

        let esporteDetectado = null;
        let maxHits = 0;

        for (const [esporte, termos] of Object.entries(termosEsportes)) {
            const hits = termos.filter(t => str.includes(t)).length;
            if (hits > maxHits && hits >= 2) {
                maxHits = hits;
                esporteDetectado = esporte;
            }
        }

        if (esporteDetectado && esporteDetectado !== moduloAtivoKey) {
            const nomeDetectado = MODULES[esporteDetectado]?.label || esporteDetectado;
            const nomeAtivo = MODULES[moduloAtivoKey]?.label || moduloAtivoKey;
            return {
                ok: false,
                erro: `Você colou um JSON de **${nomeDetectado}**,误 a aba selecionada é **${nomeAtivo}**. Alterne a aba acima para continuar.`
            };
        }

        return { ok: true };
    }

    // ============================================================
    // 2. PROMPT — ENGINE DE CÁLCULO QUANTITATIVO MONEYBALL V14
    // ============================================================
    function montarSystemPrompt(esporte) {
  return `Você é o Moneyball Bet Builder Engine v14.0 — Calculador de Precisão, Risco e Tendência para o esporte: ${esporte.toUpperCase()}.

Sua única função é transformar o JSON MDM/AUD recebido do Nexus v1.0 em um ranking RIGOROSO, DESINFLACIONADO e COERENTE de oportunidades.

Você NÃO extrai dados, NÃO pesquisa na web e NÃO cria métricas.
Você utiliza EXCLUSIVAMENTE os dados e o contexto investigativo presentes no MDM.

Sua saída deve ser exclusivamente JSON válido.

------------------------------------------------

[REGRA DE RIGOR E CALIBRAÇÃO PARA SINGLES — MONEYBALL SCORE ($sc)]

Sua diretriz primária para Apostas Simples (Singles) é a EXCLUSIVIDADE e a SELETIVIDADE. A Banda Verde ($sc >= 80) é um selo de exceção e deve representar apenas o topo da curva de assimetria.

Para que uma seleção atinja sc >= 80, ela DEVE OBRIGATORIAMENTE atender a 4 critérios sem exceção:
1. EDGE CLARO: A odd da casa deve oferecer valor real em relação à projeção estática.
2. CONSISTÊNCIA L5: O histórico recente dos últimos 5 jogos deve ser limpo, sem picos isolados ou dependência de cenários atípicos.
3. CONTEXTO LIMPO: Ausência total de ruídos (desfalques de última hora, rotação de elenco, desgaste físico extremo ou instabilidade tática).
4. MOTIVAÇÃO/DNA: O cenário do confronto deve favorecer diretamente o mercado escolhido.

SE QUALQUER UM DOS CRITÉRIOS ACIMA FOR DÚBIO OU PARCIALMENTE NEGATIVO:
- O score DEVE ser ancorado compulsoriamente na faixa de 70 a 78 (Banda Amarela/Vermelha).
- Na dúvida ou diante de incertezas táticas, penalize com -10 a -15 pontos.

------------------------------------------------

[MECÂNICA DE CÁLCULO DA STAKE ($St$)]

Você deve sempre calcular e atribuir o campo "st" (Stake Sugerida em Unidades) e "st_txt" atrelados ao score $sc$:

- Se sc >= 85 (Super Edge): "st": 1.5 a 2.0, "st_txt": "1.5u - 2.0u" (Aposta de Alta Vantagem)
- Se sc entre 80 e 84 (Edge Sólido): "st": 1.0, "st_txt": "1.0u" (Unidade Padrão)
- Se sc entre 70 e 79 (Margem/Proteção): "st": 0.5, "st_txt": "0.5u" (Meia Unidade)
- Se sc < 70 (Rejeitado): "st": 0.0, "st_txt": "0.0u" (NÃO APOSTAR)

------------------------------------------------

METODOLOGIA INTERNA DE CÁLCULO (BASE 50 + VETOR DE INÉRCIA)

1. NOTA BASE MENTAL = 50 PONTOS (Neutro).

2. ADICIONE (Vantagem Real + Tendência):
   +10 a +25 pts [Matchup & Edge]: Divergência positiva clara (Delta alto entre Baseline e Projeção).
   +10 a +15 pts [Inércia Ascendente]: O atleta/time vem em trajetória de ALTA nos últimos 3-5 jogos (L5).

3. SUBTRAIA (Penalidades de Risco & Tendência):
   -10 a -20 pts [Inércia Descendente / Filtro Anti-Hype]: Atleta ou time com reputação alta, mas em queda recente na Janela de Verdade.
   -10 a -15 pts [Volatilidade Bimodal]: Média alta gerada por picos e vales extremos.
   -15 a -25 pts [Eficiência de Mercado]: Odds muito baixas ou favoritismo óbvio precificado.
   -10 a -20 pts [Fricções Externas]: Desfalques cirúrgicos, B2B, desgaste de bullpen, clima adverso.
   -15 a -25 pts [Sinal Nexus Fraco]: Se 'nivel_confianca' do Nexus for 'baixa' ou 'dna_cenario' for 'caos', desinflacione o score severamente.

------------------------------------------------

DISTRIBUIÇÃO DE BANDAS E SELEÇÃO

• 80 a 100 🟢 BANDA VERDE: Oportunidade Real de Valor (Singles / Rígido).
• 70 a 79 🟡 BANDA AMARELA: Margem de Segurança / Proteção (Combinadas).
• 0 a 69 🔴 REJEITADO: Sem valor real, inércia descendente ou fricção alta.

Regra: Selecione de 3 a 6 bilhetes no 'top_bilhetes'.

------------------------------------------------

SCHEMA JSON OBRIGATÓRIO (SAÍDA)

{
  "prognostico": "Texto descritivo do prognóstico tático alinhado às hipóteses do Nexus...",
  "resumo": "Resumo executivo detalhando o racional macro...",
  "score_bilhete": 76.0,
  "top_bilhetes": [
    {
      "m": "Nome Exato do Mercado",
      "s": "Seleção / Nome do Time ou Atleta",
      "odds": 1.85,
      "sc": 82,
      "st": 1.0,
      "st_txt": "1.0u",
      "ip": 78,
      "ev": "+4.2%",
      "w": "Parágrafo analítico explicando o MOTIVO técnico do edge."
    }
  ],
  "analise": [
    {
      "m": "Nome do Mercado",
      "s": "Seleção",
      "sc": 62,
      "st": 0.0,
      "st_txt": "0.0u",
      "filtro": "recusado",
      "motivo": "Motivo da rejeição..."
    }
  ]
}

Responda exclusivamente em JSON válido, sem blocos de markdown adicionais.`;
}

    // ============================================================
    // 3. CONSUMO DA API DO GROQ
    // ============================================================
    async function analisarComGroq() {
        const apiKeyInput = document.getElementById("groq-key");
        const jsonInput = document.getElementById("json-input");
        const btn = document.getElementById("analisar-btn");
        const display = document.getElementById("display-area");

        const apiKey = apiKeyInput.value.trim() || localStorage.getItem("moneyball_groq_key");
        const raw = jsonInput.value.trim();

        if (!apiKey) {
            display.innerHTML = alertaErro("Cole sua Groq API Key na seção de configuração acima primeiro.");
            apiKeyInput.focus();
            return;
        }
        if (!raw) {
            display.innerHTML = alertaErro("Cole o JSON de odds antes de analisar.");
            jsonInput.focus();
            return;
        }

        try {
            const jsonParsed = JSON.parse(raw);
            const checagem = validarDadosMinimos(jsonParsed, sportAtivo);
            if (!checagem.ok) {
                display.innerHTML = alertaErro(checagem.erro);
                return;
            }
        } catch (e) {
            display.innerHTML = alertaErro("O texto colado não é um JSON válido. Verifique o formato inserido.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Processando Motor Quantitativo...`;
        display.innerHTML = `
            <div class="bg-base-panel border border-base-border rounded-2xl p-8 text-center space-y-3 animate-pulse">
                <i class="fa-solid fa-brain text-accent text-3xl"></i>
                <h3 class="text-sm font-semibold text-slate-300">Processando modelo Moneyball...</h3>
                <p class="text-xs text-slate-500">Calculando Scores Rígidos, Stakes ($St$) e Painel Tático.</p>
            </div>
        `;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: montarSystemPrompt(MODULES[sportAtivo].label) },
                        { role: "user", content: raw }
                    ],
                    temperature: 0.1,
                    response_format: { type: "json_object" }
                })
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `Erro na API Groq (Status: ${response.status})`);
            }

            const data = await response.json();
            const content = data.choices?.[0]?.message?.content || "";
            
            const cleanJson = content.replace(/```json\n?|```/g, "").trim();
            const parsedResult = JSON.parse(cleanJson);

            renderizarBilhete(parsedResult);
            jsonInput.value = ""; 

        } catch (error) {
            console.error("Erro na análise:", error);
            display.innerHTML = alertaErro(`Falha na execução: ${error.message}`);
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Analisar com Groq`;
        }
    }

    function alertaErro(msg) {
        return `<div class="bg-red-950/40 border border-red-900 text-red-300 text-sm p-4 rounded-xl">⚠️ ${msg}</div>`;
    }

    // ============================================================
    // 4. CLASSIFICAÇÃO E RENDERIZAÇÃO ROBUSTA DOS SCORES E STAKES
    // ============================================================
    function tierPorItem(item) {
        if (!item || typeof item !== 'object') return { tier: "indefinida", label: "SEM SCORE", score: null };
        
        const scoreVal = item.sc !== undefined ? item.sc : (item.score !== undefined ? item.score : item.moneyball_score);
        const score = Number(scoreVal);

        if (isNaN(score) || scoreVal === null || scoreVal === undefined) {
            return { tier: "indefinida", label: "SEM SCORE", score: null };
        }
        
        if (score >= 80) return { tier: "alta", label: "BANDA VERDE", score };
        if (score >= 70) return { tier: "media", label: "BANDA AMARELA", score };
        if (score >= 50) return { tier: "baixa", label: "BANDA VERMELHA", score };
        return { tier: "descartada", label: "DESCARTE", score };
    }

    const CONFIABILIDADE_STYLE = {
        alta: { bg: "bg-emerald-500/15", text: "text-emerald-400", border: "border-emerald-500/30" },
        media: { bg: "bg-amber-500/15", text: "text-amber-400", border: "border-amber-500/30" },
        baixa: { bg: "bg-orange-500/15", text: "text-orange-400", border: "border-orange-500/30" },
        descartada: { bg: "bg-red-500/15", text: "text-red-400", border: "border-red-500/30" },
        indefinida: { bg: "bg-slate-700/20", text: "text-slate-400", border: "border-slate-700/40" },
    };

    function cardMercado(item) {
        if (!item || typeof item !== 'object') return '';
        const tier = tierPorItem(item);
        const v = CONFIABILIDADE_STYLE[tier.tier];

        const selecaoTxt = item.s || item.selecao || item.l || "Seleção Principal";
        const mercadoTxt = item.m || "Mercado";
        const explicacao = item.w || item.motivo || "";
        const oddsVal = item.odds !== undefined ? `Odds: <span class="text-white font-mono font-bold">${item.odds}</span>` : "";
        const stakeTxt = item.st_txt || (item.st !== undefined ? `${item.st}u` : null);
        
        const ev = item.ev;
        const ip = item.ip ?? item.ip_ajustado;
        const extras = [];

        if (stakeTxt) {
            extras.push(`<span class="text-[10px] font-bold px-2 py-0.5 rounded bg-accent/20 text-accent border border-accent/30"><i class="fa-solid fa-coins mr-1"></i>Stake $St$: ${stakeTxt}</span>`);
        }
        if (ev !== undefined && ev !== null) {
            const evPositivo = !String(ev).includes("-");
            extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded ${evPositivo ? 'bg-emerald-500/15 text-emerald-400' : 'bg-red-500/15 text-red-400'}">EV ${ev}</span>`);
        }
        if (ip !== undefined && ip !== null) {
            extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-700/40 text-slate-300">IP ${ip}</span>`);
        }
        const extrasHtml = extras.length ? `<div class="flex flex-wrap items-center gap-1.5 mt-2">${extras.join("")}</div>` : "";

        return `
            <div class="p-4 bg-base-card rounded-xl border ${v.border} hover:border-accent/40 transition-colors space-y-2">
                <div class="flex justify-between items-start gap-2">
                    <span class="font-bold text-white text-sm">${mercadoTxt}</span>
                    <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${v.bg} ${v.text} shrink-0">${tier.label} · ${tier.score !== null ? tier.score : "-"}</span>
                </div>
                <div class="text-accent font-black text-lg flex items-center justify-between">
                    <span>${selecaoTxt}</span>
                    <span class="text-xs font-normal text-slate-400">${oddsVal}</span>
                </div>
                ${extrasHtml}
                ${explicacao ? `<div class="text-xs text-slate-300 leading-relaxed pt-2 border-t border-slate-800/60 mt-1">${explicacao}</div>` : ""}
            </div>`;
    }

    function renderizarBilhete(data) {
        const display = document.getElementById("display-area");

        let rawAnalise = data.analise || data.a || [];
        if (!Array.isArray(rawAnalise)) rawAnalise = [rawAnalise];

        let rawTop = data.top_bilhetes || data.tb || [];
        if (!Array.isArray(rawTop)) rawTop = [rawTop];

        const scoreBilhete = data.score_bilhete ?? data.sb;
        const prognostico = data.prognostico || data.p || "";
        const resumo = data.resumo || data.r || "";

        const painelTaticoHtml = (prognostico || resumo) ? `
            <div class="p-4 bg-gradient-to-br from-accent/15 to-accent/5 border border-accent/30 rounded-xl space-y-3">
                <div class="flex items-center justify-between text-xs font-bold uppercase tracking-wider text-accent">
                    <span><i class="fa-solid fa-chess-board mr-1"></i> Prognóstico Tático da Partida</span>
                    ${scoreBilhete !== undefined && scoreBilhete !== null ? `<span class="px-2 py-0.5 rounded bg-accent/20 text-accent font-mono">Score Médio: ${scoreBilhete}</span>` : ""}
                </div>
                ${prognostico ? `<p class="text-xs text-slate-200 leading-relaxed">${prognostico}</p>` : ""}
                ${resumo ? `<div class="text-xs text-slate-400 border-t border-accent/20 pt-2 leading-relaxed"><strong class="text-slate-300">Resumo Executivo:</strong> ${resumo}</div>` : ""}
            </div>
        ` : "";

        display.innerHTML = `
            <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-4 animate-in fade-in duration-300">
                <div class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">2</span>
                    <h2 class="text-sm font-semibold text-slate-300">Bilhete Sugerido Moneyball</h2>
                </div>

                ${painelTaticoHtml}

                <div class="space-y-3 pt-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Top Oportunidades (Singles & Base)</h3>
                    ${rawTop.length === 0
                        ? `<p class="text-sm text-slate-500 text-center py-4">Nenhum mercado aprovado na margem de segurança rígida.</p>`
                        : rawTop.map(item => cardMercado(item)).join("")
                    }
                </div>

                ${rawAnalise.length > 0 ? `
                    <details class="pt-2 border-t border-base-border">
                        <summary class="cursor-pointer text-xs font-semibold text-slate-400">Ver análise quantitativa completa (${rawAnalise.length} mercados)</summary>
                        <div class="space-y-3 mt-3">
                            ${rawAnalise.map(item => cardMercado(item)).join("")}
                        </div>
                    </details>
                ` : ""}

                <p class="text-[10px] text-slate-600 pt-2 border-t border-base-border">Modelagem baseada em probabilidade estatística, filtro de rigor e gestão de stake.</p>
            </div>
        `;
    }

    // ============================================================
    // INICIALIZAÇÃO E EVENT LISTENERS UNIFICADOS
    // ============================================================
    window.addEventListener("DOMContentLoaded", () => {
        buildSportTabs();
        selecionarSport("beisebol");

        const groqInput = document.getElementById("groq-key");
        const btnAnalisar = document.getElementById("analisar-btn");

        const savedKey = localStorage.getItem("moneyball_groq_key");
        if (savedKey && groqInput) groqInput.value = savedKey;

        if (groqInput) {
            groqInput.addEventListener("input", (e) => {
                localStorage.setItem("moneyball_groq_key", e.target.value.trim());
            });
        }

        if (btnAnalisar) {
            btnAnalisar.addEventListener("click", analisarComGroq);
        }
    });
</script>
</body>
</html>
