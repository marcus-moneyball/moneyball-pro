<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneyball Pro | Não prevê resultados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        base: { bg: '#05070d', panel: '#0d1220', card: '#111827', border: '#1f2937' },
                        accent: { DEFAULT: '#8b5cf6', dim: '#6d28d9' },
                        conf: { alta: '#10b981', media: '#f59e0b', baixa: '#ef4444' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base-bg text-slate-200 font-sans min-h-screen" style="background-image: radial-gradient(circle at 50% 0%, rgba(139,92,246,0.08), transparent 60%);">
    <div class="max-w-2xl mx-auto p-4 md:p-8 space-y-6">

        <!-- HEADER -->
        <div class="text-center space-y-2 pt-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-accent/10 border border-accent/20 text-[10px] font-bold text-accent tracking-widest uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span> Engine v12.0
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">🚀 Moneyball Pro</h1>
            <p class="text-xs text-slate-500">Inteligência quantitativa aplicada ao esporte.</p>
        </div>

        <!-- SELETOR DE ESPORTE -->
        <div id="sport-tabs" class="grid grid-cols-3 gap-2"></div>

        <!-- CONFIG DA API -->
        <details class="bg-base-panel border border-base-border rounded-2xl p-4" open>
            <summary class="cursor-pointer text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fa-solid fa-key text-accent"></i> Configuração da API Groq
            </summary>
            <div class="mt-4 space-y-2">
                <label class="text-[10px] text-slate-500 font-bold tracking-widest">GROQ API KEY (Salva no navegador)</label>
                <input type="password" id="groq-key" placeholder="gsk_..." class="w-full bg-base-bg p-2.5 rounded-lg border border-base-border text-white text-sm font-mono">
                <p class="text-[11px] text-slate-600">A chave é salva de forma privada no armazenamento local do seu navegador (localStorage). Ela nunca fica salva no código-fonte do GitHub.</p>
            </div>
        </details>

        <!-- ETAPA 1: COLAR JSON DE ODDS -->
        <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-3">
            <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">1</span>
                <label class="text-sm font-semibold text-slate-300">Cole o JSON de odds (gerado no chat de visão)</label>
            </div>
            <textarea id="json-input" class="w-full h-40 bg-base-bg p-3 rounded-lg border border-base-border font-mono text-xs text-emerald-400" placeholder='{ "casa": "...", "visitante": "...", "odds": {...}, "resumo_casa": "o que a casa espera do jogo" }'></textarea>
            <button onclick="analisarComGroq()" id="analisar-btn" class="w-full py-3.5 bg-accent hover:bg-accent-dim font-bold rounded-xl text-white shadow-lg shadow-accent/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> Analisar com Groq
            </button>
        </div>

        <!-- ETAPA 2: BILHETE -->
        <div id="display-area"></div>
    </div>

<script>
        // ============================================================
        // 1. CONFIG — cada esporte define seus mercados de interesse.
        // ============================================================
        const MODULES = {
            beisebol: {
                label: "Beisebol",
                icon: "fa-baseball",
                mercados: ["Runs (Total)", "Moneyline", "Handicap (Run Line)", "Strikeouts", "Outs Registrados", "Hits"],
                parametros: "WHIP do pitcher, OPS do ataque adversário, média de strikeouts por jogo, soma de ERA do titular + bullpen (últimas 10 partidas), histórico recente de outs/hits permitidos",
                requisitosMinimos: [
                    { label: "ERA ou WHIP do Starting Pitcher", palavrasChave: ["era", "whip"] },
                    { label: "Taxa de Strikeouts (K%) dos rebatedores adversários", palavrasChave: ["k%", "strikeout", "k %", "k_pct"] },
                ],
            },
            futebol: {
                label: "Futebol",
                icon: "fa-futbol",
                mercados: ["Gols (Over/Under)", "Moneyline (1X2)", "Handicap Asiático", "Half Time / Full Time", "Escanteios", "Chutes a Gol", "Cartões"],
                parametros: "xG (gols esperados) de cada time, xG no primeiro tempo, média de escanteios e cartões por jogo, posse de bola",
                requisitosMinimos: [
                    { label: "Forma recente (últimas 5 partidas)", palavrasChave: ["forma_recente", "forma recente", "últimos 5", "ultimas 5", "últimas 5"] },
                    { label: "Confrontos diretos (H2H)", palavrasChave: ["h2h", "confronto direto", "confrontos diretos"] },
                ],
            },
            basquete: {
                label: "Basquete",
                icon: "fa-basketball",
                mercados: ["Moneyline", "Handicap (Spread)", "Totais (Over/Under)", "Estatísticas Individuais", "Pontos", "Rebotes", "Assistências"],
                parametros: "Pace (ritmo de jogo), eficiência ofensiva/defensiva combinada, médias individuais de pontos/rebotes/assistências dos jogadores-chave",
                requisitosMinimos: [
                    { label: "Média de pontos (últimos 10 jogos)", palavrasChave: ["pontos_por_jogo", "pontos por jogo", "ppg"] },
                    { label: "Net Rating ou estatística de eficiência", palavrasChave: ["net_rating", "net rating", "offensive_rating", "defensive_rating", "eficiencia", "eficiência"] },
                ],
            },
        };

       // ============================================================
        // PROTOCOLO DE VALIDAÇÃO DE DADOS (Liberado)
        // ============================================================
        function validarDadosMinimos(dadosOdds, modulo) {
            // Bypass completo: confia na entrega do Nexus v1.0
            return { ok: true, faltando: [] };
        }

        let sportAtivo = "beisebol";

        function buildSportTabs() {
            const container = document.getElementById("sport-tabs");
            container.innerHTML = Object.entries(MODULES).map(([id, m]) => `
                <button onclick="selecionarSport('${id}')" id="sporttab-${id}"
                    class="sport-tab py-3 rounded-xl border text-sm font-semibold flex flex-col items-center gap-1 transition-all">
                    <i class="fa-solid ${m.icon}"></i>
                    <span>${m.label}</span>
                </button>
            `).join("");
        }

        function selecionarSport(id) {
            sportAtivo = id;
            document.querySelectorAll(".sport-tab").forEach(btn => {
                btn.classList.remove("bg-accent/15", "text-accent", "border-accent/40");
                btn.classList.add("bg-base-panel", "text-slate-400", "border-base-border");
            });
            const activeBtn = document.getElementById("sporttab-" + id);
            activeBtn.classList.remove("bg-base-panel", "text-slate-400", "border-base-border");
            activeBtn.classList.add("bg-accent/15", "text-accent", "border-accent/40");
        }

       // ============================================================
        // 2 PROMPT — v8.10: Análise / Moneyball Score (Com Nome dos Times)
        // ============================================================
      function montarSystemPrompt(esporte) {
  return `
Você é o **Bet Builder Engine (v8.10)**, motor quantitativo de decisão do sistema Moneyball para a modalidade **${esporte}**. Sua função é processar o MDM JSON, calcular scores, aplicar o Filtro Anti-Fragilidade e emitir o JSON final.

---

### 1. ALGORITMO SEQUENCIAL DE EXECUÇÃO

PASSO 1: Leitura do MDM
   └─ Extraia os dados e o confronto (Time Casa vs Time Visitante) do MDM JSON recebido para ${esporte}.

PASSO 2: Cálculo do Moneyball Score (0 a 100)
   └─ Atribua uma nota (0 a 100) para TODOS os mercados com base em:
      - Alinhamento de Atos e Força (IP Ajustado)
      - Robustez e estabilidade da amostra (n)
      - Distância entre linha projetada e linha da casa (Edge)
      - Fricções e Contexto (desfalques, calendário)
      - Eficiência e EV esperado.

PASSO 3: Ranking Bruto
   └─ Ordene todos os mercados do maior para o menor score.

PASSO 4: Filtro Anti-Fragilidade
   └─ Atribua \`filtro: "aprovado"\` ou \`filtro: "bloqueado"\`.

PASSO 5: Seleção de Top Bilhetes
   └─ Extraia para \`top_bilhetes\` apenas os aprovados do topo (máx 6). Cada item DEVE conter explicitamente o nome da equipe/seleção e uma explicação técnica rica e detalhada em \`w\`.

PASSO 6: Auditoria e Output
   └─ Emita EXCLUSIVAMENTE o JSON estruturado abaixo.

---

### 2. REGRAS ABSOLUTAS DE SAÍDA (ZERO CONVERSA)
- PROIBIDO: Saudação, explicação textual fora do JSON ou blocos de marcação markdown (não use \`\`\`json).
- OBRIGATÓRIO: A resposta deve começar exatamente em \`{\` e terminar em \`}\`.

---

### SAÍDA:
{
  "p": "Prognóstico em até 300 chars",
  "r": "Resumo executivo em até 150 chars",
  "sb": 0,
  "tb": [
    {
      "e": "Esporte",
      "m": "Mercado",
      "s": "Seleção + Linha Exata",
      "at": "A|B",
      "sc": 80,
      "ip": 7.5,
      "b": "Verde|Amarela|Vermelha",
      "st": 1.0,
      "ev": 0.0,
      "w": "Justificativa prática em até 200 chars",
      "f": ["fator_risco"]
    }
  ],
  "a": [
    {
      "e": "", "m": "", "s": "", "sc": 0, "b": "Descarte", "st": 0
    }
  ]
}`;
}

        // ============================================================
        // 4. CLASSIFICAÇÃO POR MONEYBALL SCORE (Super Robusta)
        // ============================================================
        const BANDA_MAP = {
            "verde": { tier: "alta", label: "BANDA VERDE" },
            "amarela": { tier: "media", label: "BANDA AMARELA" },
            "vermelha": { tier: "baixa", label: "BANDA VERMELHA" },
            "descarte": { tier: "descartada", label: "DESCARTE" },
        };

        function tierPorItem(item) {
            if (!item || typeof item !== 'object') return { tier: "indefinida", label: "SEM SCORE", score: null };
            
            // Varredura ampla para capturar o score em qualquer nome de chave (sc, score, moneyball_score)
            const scoreVal = item.sc !== undefined ? item.sc : (item.score !== undefined ? item.score : item.moneyball_score);
            const score = Number(scoreVal);

            const banda = (item.b || "").toLowerCase();
            if (BANDA_MAP[banda]) return { ...BANDA_MAP[banda], score: isNaN(score) ? null : score };
            
            if (isNaN(score) || score === null || score === undefined) {
                return { tier: "indefinida", label: "SEM SCORE", score: null };
            }
            
            if (score >= 75) return { tier: "alta", label: "ALTA CONFIABILIDADE", score };
            if (score >= 60) return { tier: "media", label: "MÉDIA CONFIABILIDADE", score };
            if (score >= 45) return { tier: "baixa", label: "BAIXA CONFIABILIDADE", score };
            return { tier: "descartada", label: "SCORE BAIXO", score };
        }

        const CONFIABILIDADE_STYLE = {
            alta: { bg: "bg-emerald-500/15", text: "text-emerald-400", border: "border-emerald-500/30" },
            media: { bg: "bg-amber-500/15", text: "text-amber-400", border: "border-amber-500/30" },
            baixa: { bg: "bg-orange-500/15", text: "text-orange-400", border: "border-orange-500/30" },
            descartada: { bg: "bg-red-500/15", text: "text-red-400", border: "border-red-500/30" },
            indefinida: { bg: "bg-slate-700/20", text: "text-slate-400", border: "border-slate-700/40" },
        };

        function cardMercado(item) {
            if (!item || typeof item !== 'object') return '';
            const tier = tierPorItem(item);
            const v = CONFIABILIDADE_STYLE[tier.tier];

            const selecaoTxt = item.s || item.selecao || item.l || "Seleção Principal";
            const mercadoTxt = item.m || "Mercado";
            const explicacao = item.w || item.motivo || "";
            const oddsVal = item.odds !== undefined ? ` · Odds: <span class="text-white font-mono">${item.odds}</span>` : "";

            return `
                <div class="p-4 bg-base-card rounded-xl border ${v.border} hover:border-accent/40 transition-colors space-y-2">
                    <div class="flex justify-between items-start gap-2">
                        <span class="font-bold text-white text-sm">${mercadoTxt}</span>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${v.bg} ${v.text} shrink-0">${tier.label} · ${tier.score !== null ? tier.score : "-"}</span>
                    </div>
                    <div class="text-accent font-black text-lg flex items-center justify-between">
                        <span>${selecaoTxt}</span>
                        <span class="text-xs font-normal text-slate-400">${oddsVal}</span>
                    </div>
                    ${explicacao ? `<div class="text-xs text-slate-300 leading-relaxed pt-1 border-t border-slate-800/60">${explicacao}</div>` : ""}
                </div>`;
        }
        // ============================================================
        // 3. CHAMADA AO GROQ
        // ============================================================
        async function analisarComGroq() {
            const apiKey = document.getElementById("groq-key").value.trim();
            const raw = document.getElementById("json-input").value.trim();
            const btn = document.getElementById("analisar-btn");
            const display = document.getElementById("display-area");

            if (!apiKey) {
                display.innerHTML = alertaErro("Cole sua Groq API Key na seção de configuração acima primeiro.");
                return;
            }
            if (!raw) {
                display.innerHTML = alertaErro("Cole o JSON de odds antes de analisar.");
                return;
            }

            let dadosOdds;
            try {
                dadosOdds = JSON.parse(raw);
            } catch (e) {
                display.innerHTML = alertaErro("O JSON colado está com formato inválido.");
                return;
            }

            const modulo = MODULES[sportAtivo];

            if (dadosOdds.esporte && dadosOdds.esporte.toLowerCase() !== sportAtivo.toLowerCase()) {
                display.innerHTML = alertaErro(`O JSON colado é de "${dadosOdds.esporte}", mas a aba selecionada é "${modulo.label}".`);
                return;
            }

            const validacaoDados = validarDadosMinimos(dadosOdds, modulo);
            if (!validacaoDados.ok) {
                display.innerHTML = `<div class="bg-amber-950/30 border border-amber-800/40 text-amber-300 text-sm p-4 rounded-xl space-y-2">
                                        <p class="font-bold">⚠️ DADOS INSUFICIENTES</p>
                                        <ul class="text-xs list-disc list-inside">${validacaoDados.faltando.map(f => `<li>${f}</li>`).join("")}</ul>
                                    </div>`;
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Analisando...`;
            display.innerHTML = `<p class="text-slate-500 text-sm text-center py-4">Processando...</p>`;

            try {
                const systemPrompt = montarSystemPrompt(modulo) + " Seja conciso nos textos, mas preencha todos os campos numéricos. Responda apenas com o JSON, sem textos adicionais.";
                const userInput = raw;

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-oss-120b",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userInput }
                        ],
                        temperature: 0.2,
                        max_completion_tokens: 6000,
                        reasoning_effort: "low",
                        include_reasoning: false,
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText.slice(0, 200)}`);
                }

                const data = await response.json();
                const conteudo = data.choices?.[0]?.message?.content;
                if (!conteudo) throw new Error("Resposta do Groq veio vazia.");

                const parsed = JSON.parse(conteudo.replace(/```json|```/g, "").trim());
                renderizarBilhete(parsed);
            } catch (err) {
                console.error("Erro na análise Groq:", err);
                display.innerHTML = alertaErro(`Não consegui completar a análise. ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Analisar com Groq`;
            }
        }

        function alertaErro(msg) {
            return `<div class="bg-red-950/40 border border-red-900 text-red-300 text-sm p-4 rounded-xl">⚠️ ${msg}</div>`;
        }

       // ============================================================
        // 4. CLASSIFICAÇÃO POR MONEYBALL SCORE (Corrigida para ler 'sc')
        // ============================================================
        const BANDA_MAP = {
            "verde": { tier: "alta", label: "BANDA VERDE" },
            "amarela": { tier: "media", label: "BANDA AMARELA" },
            "vermelha": { tier: "baixa", label: "BANDA VERMELHA" },
            "descarte": { tier: "descartada", label: "DESCARTE" },
        };
 
        function tierPorItem(item) {
            const score = Number(item.sc ?? item.moneyball_score);
            const banda = (item.b || "").toLowerCase();
            if (BANDA_MAP[banda]) return { ...BANDA_MAP[banda], score };
            if (isNaN(score)) return { tier: "indefinida", label: "SEM SCORE", score: null };
            if (score >= 75) return { tier: "alta", label: "ALTA CONFIABILIDADE", score };
            if (score >= 60) return { tier: "media", label: "MÉDIA CONFIABILIDADE", score };
            if (score >= 45) return { tier: "baixa", label: "BAIXA CONFIABILIDADE", score };
            return { tier: "descartada", label: "SCORE BAIXO", score };
        }
 
        const CONFIABILIDADE_STYLE = {
            alta: { bg: "bg-conf-alta/15", text: "text-conf-alta", border: "border-conf-alta/30" },
            media: { bg: "bg-conf-media/15", text: "text-conf-media", border: "border-conf-media/30" },
            baixa: { bg: "bg-orange-500/15", text: "text-orange-400", border: "border-orange-500/30" },
            descartada: { bg: "bg-conf-baixa/15", text: "text-conf-baixa", border: "border-conf-baixa/30" },
            indefinida: { bg: "bg-slate-700/20", text: "text-slate-400", border: "border-slate-700/40" },
        };
 
        function cardMercado(item) {
            const tier = tierPorItem(item);
            const v = CONFIABILIDADE_STYLE[tier.tier];
 
            const selecaoTxt = item.s || `${item.selecao || ""}${item.l ? ` ${item.l}` : ""}`;
            const ev = item.ev;
            const ip = item.ip ?? item.ip_ajustado;
            const stake = item.st ?? item.stake_sugerida;
            const ativo = item.at ?? item.ativo;
            const fatores = item.f || [];
 
            const extras = [];
            if (ev !== undefined && ev !== null) {
                const evPositivo = Number(ev) >= 0;
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded ${evPositivo ? 'bg-conf-alta/15 text-conf-alta' : 'bg-conf-baixa/15 text-conf-baixa'}">EV ${evPositivo ? '+' : ''}${ev}</span>`);
            }
            if (ip !== undefined && ip !== null) {
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-700/40 text-slate-300">IP Ajustado ${ip}</span>`);
            }
            if (stake !== undefined && stake !== null) {
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-accent/15 text-accent">Stake ${stake}u</span>`);
            }
            if (ativo) {
                extras.push(`<span class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-700/40 text-slate-300">Ativo ${ativo}</span>`);
            }
            const extrasHtml = extras.length ? `<div class="flex flex-wrap gap-1.5 mt-1.5">${extras.join("")}</div>` : "";
            const fatoresHtml = fatores.length ? `<div class="flex flex-wrap gap-1.5 mt-1.5">${fatores.map(fr => `<span class="text-[10px] font-medium px-2 py-0.5 rounded bg-red-500/10 text-red-400 border border-red-500/20">⚠ ${fr}</span>`).join("")}</div>` : "";
 
            return `
                <div class="p-4 bg-base-card rounded-xl border ${v.border} hover:border-accent/40 transition-colors">
                    <div class="flex justify-between items-start gap-2">
                        <span class="font-bold text-white text-sm">${item.m || ""}</span>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${v.bg} ${v.text} shrink-0">${tier.label} · ${tier.score ?? "-"}</span>
                    </div>
                    <div class="text-accent font-black text-lg mt-1">${selecaoTxt}</div>
                    ${extrasHtml}
                    ${fatoresHtml}
                    ${item.w ? `<div class="text-xs text-slate-500 mt-1.5 leading-relaxed">${item.w}</div>` : ""}
                </div>`;
        }

        // ============================================================
        // 5. RENDERIZAÇÃO DO BILHETE (SUPER BLINDADA)
        // ============================================================
        function renderizarBilhete(data) {
            const display = document.getElementById("display-area");

            // ➔ BLINDAGEM DE 'analiseCompleta'
            let rawAnalise = data.a || data.analise || [];
            if (!Array.isArray(rawAnalise)) {
                rawAnalise = typeof rawAnalise === 'object' && rawAnalise !== null ? [rawAnalise] : [];
            }
            const analiseCompleta = rawAnalise;

            // ➔ BLINDAGEM DE 'topBilhetes'
            let rawTop = data.tb || data.top_bilhetes || [];
            if (!Array.isArray(rawTop)) {
                rawTop = typeof rawTop === 'object' && rawTop !== null ? [rawTop] : [];
            }
            const topBilhetes = [...rawTop].sort((a, b) => (Number(b.sc ?? b.moneyball_score) || 0) - (Number(a.sc ?? a.moneyball_score) || 0));

            const scoreBilhete = data.sb ?? data.score_bilhete;
            const prognostico = data.p || data.resumo;
            const resumoExecutivo = data.r;

            const melhor = topBilhetes[0] || null;
            const melhorSelecaoTxt = melhor ? (melhor.s || `${melhor.selecao || ""}${melhor.l ? ` ${melhor.l}` : ""}`) : "";
            const melhorScore = melhor ? (melhor.sc ?? melhor.moneyball_score) : null;

            const destaqueHtml = melhor ? `
                <div class="p-4 bg-gradient-to-br from-accent/15 to-accent/5 border-2 border-accent rounded-xl">
                    <div class="flex items-center gap-2 text-accent text-xs font-bold mb-1">
                        <i class="fa-solid fa-trophy"></i> MELHOR SUGESTÃO DO JOGO
                    </div>
                    <div class="text-white font-black text-xl">${melhorSelecaoTxt}</div>
                    <div class="text-xs text-slate-400 mt-1">${melhor.m || ""} · Moneyball Score: <span class="font-semibold text-slate-300">${melhorScore ?? "-"}</span>${melhor.ev !== undefined ? ` · EV: <span class="font-semibold text-slate-300">${melhor.ev}</span>` : ""}</div>
                    <div class="text-xs text-slate-500 mt-1.5 leading-relaxed">${melhor.w || ""}</div>
                </div>
            ` : "";

            display.innerHTML = `
                <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-4 animate-in fade-in duration-300">
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">2</span>
                        <h2 class="text-sm font-semibold text-slate-300">Bilhete Sugerido</h2>
                        ${scoreBilhete !== undefined && scoreBilhete !== null ? `<span class="ml-auto text-[10px] font-bold px-2 py-1 rounded-lg bg-accent/15 text-accent">Score do Bilhete: ${scoreBilhete}</span>` : ""}
                    </div>

                    ${prognostico ? `<p class="text-sm text-slate-400 border-l-2 border-accent pl-3 leading-relaxed">${prognostico}</p>` : ""}
                    ${resumoExecutivo ? `<p class="text-xs italic text-slate-500">${resumoExecutivo}</p>` : ""}

                    ${destaqueHtml}

                    <div class="space-y-3">
                        ${topBilhetes.length === 0
                            ? `<p class="text-sm text-slate-500 text-center py-4">Nenhum mercado atingiu a margem mínima de segurança (Score >= 50).</p>`
                            : topBilhetes.map(item => cardMercado(item)).join("")
                        }
                    </div>

                    ${analiseCompleta.length > 0 ? `
                        <details class="pt-2 border-t border-base-border">
                            <summary class="cursor-pointer text-xs font-semibold text-slate-400">Ver análise completa (${analiseCompleta.length} mercado(s) avaliados)</summary>
                            <div class="space-y-3 mt-3">
                                ${analiseCompleta.map(item => cardMercado(item)).join("")}
                            </div>
                        </details>
                    ` : ""}

                    <p class="text-[10px] text-slate-600 pt-2 border-t border-base-border">Isso é apoio à análise baseado em dados, não garantia de resultado.</p>
                </div>
            `;
        }

        // ============================================================
        // INIT & PERSISTÊNCIA DA CHAVE
        // ============================================================
        window.onload = () => {
            buildSportTabs();
            selecionarSport("beisebol");

            const groqInput = document.getElementById("groq-key");

            const savedKey = localStorage.getItem("moneyball_groq_key");
            if (savedKey) {
                groqInput.value = savedKey;
            }

            groqInput.addEventListener("input", (e) => {
                localStorage.setItem("moneyball_groq_key", e.target.value.trim());
            });
        };
    </script>
</body>
</html>
