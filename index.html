<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneyball Pro | Conversion Engine v15.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        base: { bg: '#05070d', panel: '#0d1220', card: '#111827', border: '#1f2937' },
                        accent: { DEFAULT: '#8b5cf6', dim: '#6d28d9' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base-bg text-slate-200 font-sans min-h-screen" style="background-image: radial-gradient(circle at 50% 0%, rgba(139,92,246,0.08), transparent 60%);">
    <div class="max-w-2xl mx-auto p-4 md:p-8 space-y-6">

        <!-- HEADER -->
        <div class="text-center space-y-2 pt-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-accent/10 border border-accent/20 text-[10px] font-bold text-accent tracking-widest uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span> Engine v15.2 — Leitura & Análise Esportiva
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">🚀 Moneyball Pro</h1>
            <p class="text-xs text-slate-500">Conversor de Oportunidades e Inteligência Esportiva.</p>
        </div>

        <!-- SELETOR DE ESPORTE -->
        <div id="sport-tabs" class="grid grid-cols-3 gap-2"></div>

        <!-- CONFIG DA API -->
        <details class="bg-base-panel border border-base-border rounded-2xl p-4" open>
            <summary class="cursor-pointer text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fa-solid fa-key text-accent"></i> Configuração da API Groq
            </summary>
            <div class="mt-4 space-y-2">
                <label class="text-[10px] text-slate-500 font-bold tracking-widest">GROQ API KEY (Salva no navegador)</label>
                <input type="password" id="groq-key" placeholder="gsk_..." class="w-full bg-base-bg p-2.5 rounded-lg border border-base-border text-white text-sm font-mono">
                <p class="text-[11px] text-slate-600">A chave é salva de forma privada no armazenamento local do seu navegador (localStorage).</p>
            </div>
        </details>

        <!-- ETAPA 1: COLAR JSON DO NEXUS -->
        <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-3">
            <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">1</span>
                <label class="text-sm font-semibold text-slate-300">Cole o JSON do Nexus v2.1</label>
            </div>
            <textarea id="json-input" class="w-full h-40 bg-base-bg p-3 rounded-lg border border-base-border font-mono text-xs text-emerald-400" placeholder='Cole o JSON investigativo do Nexus v2.1 aqui...'></textarea>
            <button id="analisar-btn" class="w-full py-3.5 bg-accent hover:bg-accent-dim font-bold rounded-xl text-white shadow-lg shadow-accent/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> Analisar Oportunidades via Groq
            </button>
        </div>

        <!-- ETAPA 2: DISPLAY DE PAINEL -->
        <div id="display-area"></div>
    </div>

<script>
    const MODULES = {
        beisebol: { label: "Beisebol", icon: "fa-baseball" },
        futebol: { label: "Futebol", icon: "fa-futbol" },
        basquete: { label: "Basquete", icon: "fa-basketball" }
    };

    let sportAtivo = "futebol";

    function buildSportTabs() {
        const container = document.getElementById("sport-tabs");
        container.innerHTML = Object.entries(MODULES).map(([key, mod]) => `
            <button onclick="selecionarSport('${key}')" id="tab-${key}" class="py-3 px-4 rounded-xl border text-xs font-bold flex items-center justify-center gap-2 transition-all ${key === sportAtivo ? 'bg-accent/15 border-accent text-accent shadow-lg shadow-accent/10' : 'bg-base-panel border-base-border text-slate-400 hover:border-slate-700'}">
                <i class="fa-solid ${mod.icon}"></i> ${mod.label}
            </button>
        `).join("");
    }

    function selecionarSport(key) {
        sportAtivo = key;
        buildSportTabs();
    }

    function validarDadosMinimos(dadosNexus, moduloAtivoKey) {
        const str = JSON.stringify(dadosNexus).toLowerCase();
        const termosEsportes = {
            futebol: ["xg", "xga", "escanteios", "cartoes", "1x2", "half time", "gols", "futebol", "corners"],
            beisebol: ["pitcher", "era", "whip", "innings", "runs", "strikeouts", "mlb", "home runs", "beisebol"],
            basquete: ["rebotes", "assistencias", "pontos", "nba", "quarto", "triplos", "basquete", "handicap"]
        };

        let esporteDetectado = null;
        let maxHits = 0;

        for (const [esporte, termos] of Object.entries(termosEsportes)) {
            const hits = termos.filter(t => str.includes(t)).length;
            if (hits > maxHits && hits >= 2) {
                maxHits = hits;
                esporteDetectado = esporte;
            }
        }

        if (esporteDetectado && esporteDetectado !== moduloAtivoKey) {
            const nomeDetectado = MODULES[esporteDetectado]?.label || esporteDetectado;
            const nomeAtivo = MODULES[moduloAtivoKey]?.label || moduloAtivoKey;
            return {
                ok: false,
                erro: `Você colou um JSON de **${nomeDetectado}**, mas a aba selecionada é **${nomeAtivo}**. Alterne a aba acima para continuar.`
            };
        }

        return { ok: true };
    }

    // ============================================================
// SYSTEM PROMPT V15.3 — MODO DE TESTE (SEM PENALIZAÇÃO FIXA DE ML)
// ============================================================
function montarSystemPrompt(esporte) {
  return `Você é o Moneyball Bet Builder Engine v15.3 (Modo Teste de Estresse) para o esporte: ${esporte.toUpperCase()}.

Sua função é transformar os dados do Nexus v2.1 em entradas práticas, seguras e lucrativas para apostadores.

REGRAS DE LINGUAGEM:
- NUNCA use jargões acadêmicos como "assimetria monetizada", "mismatch estrutural" ou "bloco baixo".
- Fale a LÍNGUA DO APOSTADOR: direta, simples e focada na vantagem prática do mercado.
- Explique de forma transparente o motivo da escolha.

Você NÃO calcula Stake e NÃO calcula EV probabilístico fictício. Usa EXCLUSIVAMENTE os dados do Nexus v2.1.

Sua saída deve ser exclusivamente JSON válido.

------------------------------------------------

[REGRA DE AVALIAÇÃO DE MERCADOS - MODO TESTE DE ESTRESSE]
• NESTE MODO DE TESTE, OS MERCADOS DE VENCEDOR / MONEYLINE (1X2) NÃO POSSUEM PENALIDADE AUTOMÁTICA DE SCORE.
• Avalie ML/Vencedor em pé de igualdade com mercados de volume (chutes, cantos, pontos, props).
• PENALIDADE DE CONSENSO (Ainda Ativa): Se o mercado de ML for apenas favoritismo óbvio sem sustentação tática clara nos dados do Nexus, aplique penalidade de -5 a -15 pontos no Score ($sc).

------------------------------------------------

[MONEYBALL SCORE ($sc) - 0 a 100]
• 80 a 100 🟢 BANDA VERDE: Elite.
• 70 a 79 🟡 BANDA AMARELA: Qualidade.
• 0 a 69 🔴 BANDA VERMELHA: DESCARTADO.

------------------------------------------------

SCHEMA JSON OBRIGATÓRIO (SAÍDA)

{
  "prognostico": "Texto simples e direto sobre o panorama do jogo...",
  "resumo": "Resumo executivo claro e sem jargões complexos, focado na lógica das escolhas...",
  "status_conversao": "convertido|sem_conversao",
  "motivo_sem_conversao": null,
  "score_bilhete": 78.0,
  "alertas_correlacao": [
    "⚠️ Alerta prático se houver risco entre as apostas escolhidas, ou array vazio []."
  ],
  "top_assimetrias_convertidas": [
    {
      "m": "Nome Exato do Mercado",
      "s": "Seleção / Nome do Time ou Atleta",
      "assimetria_capturada": "A vantagem do jogo que estamos aproveitando",
      "tipo_de_ativo": "processo|resultado",
      "odds": 1.85,
      "sc": 84,
      "forca_encaixe_nexus": 92,
      "dependencia_resultado": "baixa|media|alta",
      "descolamento_mercado": "forte|moderado|inexistente",
      "risco_execucao": "baixo|medio|alto",
      "categoria": "elite|qualidade|especulativo",
      "w": "Motivo direto e prático de por que essa escolha é vantajosa."
    }
  ],
  "mercados_descartados": [
    {
      "m": "Nome do Mercado Rejeitado",
      "s": "Seleção",
      "assimetria_capturada": "Brecha ignorada ou fraca",
      "tipo_de_ativo": "processo|resultado",
      "sc": 62,
      "status": "descartado",
      "motivo": "Motivo simples do descarte..."
    }
  ]
}

Responda exclusivamente em JSON válido, sem blocos de markdown adicionais.`;
}
    async function analisarComGroq() {
        const apiKeyInput = document.getElementById("groq-key");
        const jsonInput = document.getElementById("json-input");
        const btn = document.getElementById("analisar-btn");
        const display = document.getElementById("display-area");

        const apiKey = apiKeyInput.value.trim() || localStorage.getItem("moneyball_groq_key");
        const raw = jsonInput.value.trim();

        if (!apiKey) {
            display.innerHTML = alertaErro("Cole sua Groq API Key na seção de configuração acima primeiro.");
            apiKeyInput.focus();
            return;
        }
        if (!raw) {
            display.innerHTML = alertaErro("Cole o JSON do Nexus v2.1 antes de analisar.");
            jsonInput.focus();
            return;
        }

        try {
            const jsonParsed = JSON.parse(raw);
            const checagem = validarDadosMinimos(jsonParsed, sportAtivo);
            if (!checagem.ok) {
                display.innerHTML = alertaErro(checagem.erro);
                return;
            }
        } catch (e) {
            display.innerHTML = alertaErro("O texto colado não é um JSON válido. Verifique o formato inserido.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Analisando Brechas do Jogo...`;
        display.innerHTML = `
            <div class="bg-base-panel border border-base-border rounded-2xl p-8 text-center space-y-3 animate-pulse">
                <i class="fa-solid fa-magnifying-glass-chart text-accent text-3xl"></i>
                <h3 class="text-sm font-semibold text-slate-300">Buscando Melhores Oportunidades...</h3>
                <p class="text-xs text-slate-500">Filtrando apostas com menor risco e maior probabilidade.</p>
            </div>
        `;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: montarSystemPrompt(MODULES[sportAtivo].label) },
                        { role: "user", content: raw }
                    ],
                    temperature: 0.1,
                    response_format: { type: "json_object" }
                })
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `Erro na API Groq (Status: ${response.status})`);
            }

            const data = await response.json();
            const content = data.choices?.[0]?.message?.content || "";
            const cleanJson = content.replace(/```json\n?|```/g, "").trim();
            const parsedResult = JSON.parse(cleanJson);

            renderizarPainel(parsedResult);
            jsonInput.value = ""; 

        } catch (error) {
            console.error("Erro na análise:", error);
            display.innerHTML = alertaErro(`Falha na execução: ${error.message}`);
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Analisar Oportunidades via Groq`;
        }
    }

    function alertaErro(msg) {
        return `<div class="bg-red-950/40 border border-red-900 text-red-300 text-sm p-4 rounded-xl">⚠️ ${msg}</div>`;
    }

    function cardAssimetriaConvertida(item) {
        if (!item || typeof item !== 'object') return '';

        const sc = item.sc ?? '-';
        const mercado = item.m || "Mercado";
        const selecao = item.s || "Seleção";
        const brecha = item.assimetria_capturada || "Não especificada";
        
        // Tradução visual simples dos termos técnicos
        const tipoAtivoOriginal = item.tipo_de_ativo || "processo";
        const tipoAtivoFormatado = tipoAtivoOriginal === "processo" ? "Volume de Jogo" : "Placar / Vencedor";
        
        const oddsVal = item.odds ? `Odd: <span class="text-white font-mono font-bold">${item.odds}</span>` : "";
        const encaixe = item.forca_encaixe_nexus ? `${item.forca_encaixe_nexus}%` : "-";
        const depResultado = item.dependencia_resultado || "baixa";
        const explicacao = item.w || "";

        const depStyle = {
            baixa: "bg-emerald-500/15 text-emerald-400 border-emerald-500/30",
            media: "bg-amber-500/15 text-amber-400 border-amber-500/30",
            alta: "bg-red-500/15 text-red-400 border-red-500/30"
        }[depResultado] || "bg-slate-700/20 text-slate-400 border-slate-700/40";

        return `
            <div class="p-4 bg-base-card rounded-xl border border-accent/30 hover:border-accent/60 transition-colors space-y-3">
                <div class="flex justify-between items-start gap-2">
                    <div>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-accent/20 text-accent uppercase tracking-wider">${tipoAtivoFormatado}</span>
                        <h4 class="font-bold text-white text-sm mt-1">${mercado}</h4>
                    </div>
                    <div class="text-right shrink-0">
                        <span class="text-xs font-black px-2.5 py-1 rounded-lg bg-emerald-500/15 text-emerald-400 border border-emerald-500/30">Score: ${sc}</span>
                    </div>
                </div>

                <div class="text-accent font-black text-base flex items-center justify-between">
                    <span>${selecao}</span>
                    <span class="text-xs font-normal text-slate-400">${oddsVal}</span>
                </div>

                <div class="p-2 bg-base-bg rounded-lg border border-base-border text-xs space-y-1">
                    <div class="text-slate-400"><strong class="text-slate-300">Vantagem do Jogo:</strong> ${brecha}</div>
                    <div class="flex flex-wrap gap-2 pt-1 text-[10px]">
                        <span class="px-2 py-0.5 rounded bg-slate-800 text-slate-300 border border-slate-700"><i class="fa-solid fa-bullseye text-accent mr-1"></i>Aderência ao Cenario: ${encaixe}</span>
                        <span class="px-2 py-0.5 rounded border ${depStyle} uppercase font-bold">Risco de Placar: ${depResultado}</span>
                    </div>
                </div>

                ${explicacao ? `<p class="text-xs text-slate-300 leading-relaxed pt-1">${explicacao}</p>` : ""}
            </div>`;
    }

    function cardMercadoDescartado(item) {
        if (!item || typeof item !== 'object') return '';

        const mercado = item.m || "Mercado";
        const selecao = item.s || "Seleção";
        const motivo = item.motivo || "Não especificado";
        const sc = item.sc ?? '-';

        return `
            <div class="p-3 bg-base-card/50 rounded-xl border border-red-900/30 text-xs space-y-1.5 opacity-85">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-slate-300">${mercado} (${selecao})</span>
                    <span class="text-[10px] px-2 py-0.5 rounded bg-red-950 text-red-400 border border-red-900/40 font-mono">Score: ${sc}</span>
                </div>
                <p class="text-slate-400 leading-relaxed"><strong class="text-red-400">Por que foi descartado:</strong> ${motivo}</p>
            </div>`;
    }

    function renderizarPainel(data) {
        const display = document.getElementById("display-area");

        const statusConversao = data.status_conversao || "convertido";
        const motivoSemConversao = data.motivo_sem_conversao || null;
        const prognostico = data.prognostico || "";
        const resumo = data.resumo || "";
        const scoreBilhete = data.score_bilhete ?? null;
        const alertas = data.alertas_correlacao || [];

        let convertidas = data.top_assimetrias_convertidas || [];
        if (!Array.isArray(convertidas)) convertidas = [convertidas];

        let descartados = data.mercados_descartados || [];
        if (!Array.isArray(descartados)) descartados = [descartados];

        if (statusConversao === "sem_conversao") {
            display.innerHTML = `
                <div class="bg-base-panel border border-amber-500/30 rounded-2xl p-6 space-y-4">
                    <div class="flex items-center gap-2 text-amber-400 font-bold text-sm">
                        <i class="fa-solid fa-shield-halved text-lg"></i> JOGO SEM APOSTAS RECOMENDADAS
                    </div>
                    <p class="text-xs text-slate-300 leading-relaxed">${prognostico}</p>
                    <div class="p-4 bg-amber-950/20 border border-amber-900/40 rounded-xl text-xs text-amber-200">
                        <strong>Motivo:</strong> ${motivoSemConversao || "Nenhum mercado apresentou segurança suficiente para entrada neste confronto."}
                    </div>
                </div>
            `;
            return;
        }

        const painelTaticoHtml = (prognostico || resumo) ? `
            <div class="p-4 bg-gradient-to-br from-accent/15 to-accent/5 border border-accent/30 rounded-xl space-y-3">
                <div class="flex items-center justify-between text-xs font-bold uppercase tracking-wider text-accent">
                    <span><i class="fa-solid fa-compass mr-1"></i> Visão Geral do Jogo</span>
                    ${scoreBilhete !== null ? `<span class="px-2 py-0.5 rounded bg-accent/20 text-accent font-mono">Score Médio: ${scoreBilhete}</span>` : ""}
                </div>
                ${prognostico ? `<p class="text-xs text-slate-200 leading-relaxed">${prognostico}</p>` : ""}
                ${resumo ? `<div class="text-xs text-slate-300 border-t border-accent/20 pt-2 leading-relaxed"><strong class="text-accent uppercase text-[10px] tracking-wider block mb-0.5">Resumo Executivo:</strong> ${resumo}</div>` : ""}
            </div>
        ` : "";

        const alertasHtml = alertas.length > 0 ? `
            <div class="p-3 bg-amber-950/30 border border-amber-800/40 rounded-xl text-xs text-amber-300 space-y-1">
                ${alertas.map(a => `<div>${a}</div>`).join("")}
            </div>
        ` : "";

        display.innerHTML = `
            <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-4 animate-in fade-in duration-300">
                <div class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full bg-accent/20 text-accent text-xs font-bold flex items-center justify-center">2</span>
                    <h2 class="text-sm font-semibold text-slate-300">Oportunidades Selecionadas</h2>
                </div>

                ${painelTaticoHtml}
                ${alertasHtml}

                <div class="space-y-3 pt-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Apostas Recomendadas</h3>
                    ${convertidas.length === 0
                        ? `<p class="text-xs text-slate-500 text-center py-4">Nenhuma oportunidade atendeu aos critérios mínimos de segurança.</p>`
                        : convertidas.map(item => cardAssimetriaConvertida(item)).join("")
                    }
                </div>

                ${descartados.length > 0 ? `
                    <details class="pt-2 border-t border-base-border">
                        <summary class="cursor-pointer text-xs font-semibold text-slate-400">Ver apostas descartadas (${descartados.length} rejeições)</summary>
                        <div class="space-y-2 mt-3">
                            ${descartados.map(item => cardMercadoDescartado(item)).join("")}
                        </div>
                    </details>
                ` : ""}

                <p class="text-[10px] text-slate-600 pt-2 border-t border-base-border">Modelagem focada em estatísticas de volume de jogo e redução de risco de placar.</p>
            </div>
        `;
    }

    window.addEventListener("DOMContentLoaded", () => {
        buildSportTabs();
        selecionarSport("futebol");

        const groqInput = document.getElementById("groq-key");
        const btnAnalisar = document.getElementById("analisar-btn");

        const savedKey = localStorage.getItem("moneyball_groq_key");
        if (savedKey && groqInput) groqInput.value = savedKey;

        if (groqInput) {
            groqInput.addEventListener("input", (e) => {
                localStorage.setItem("moneyball_groq_key", e.target.value.trim());
            });
        }

        if (btnAnalisar) {
            btnAnalisar.addEventListener("click", analisarComGroq);
        }
    });
</script>
</body>
</html>
